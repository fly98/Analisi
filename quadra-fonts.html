<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quadra — prova font</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@500;600;700&family=Outfit:wght@500;600;700&family=Manrope:wght@600;700;800&family=Syne:wght@600;700;800&family=Unbounded:wght@500;600;700&family=Bricolage+Grotesque:wght@600;700&family=Instrument+Sans:wght@500;600;700&family=Familjen+Grotesk:wght@500;600;700&family=Onest:wght@600;700;800&family=Space+Mono:wght@700&family=DM+Mono:wght@500&family=Archivo:wght@600;700;800&family=Chivo+Mono:wght@500;600;700&family=Michroma&family=Sometype+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#f5f4f0; --sidebar-bg:#f0efe9; --text:#1a1a1a; --muted:#666; --border:rgba(0,0,0,.08); }
  *{box-sizing:border-box}
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; padding:0 0 60px; }
  header{ position:sticky; top:0; z-index:5; background:rgba(245,244,240,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:14px 18px; }
  h1{ font-size:17px; margin:0 0 3px; }
  .sub{ font-size:12px; color:var(--muted); margin:0 0 12px; }
  .controls{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  .ctrl{ display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--muted); }
  .ctrl label{ font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .ctrl .val{ color:var(--text); font-weight:700; }
  input[type=range]{ width:130px; }
  .seg{ display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button{ border:none; background:#fff; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); }
  .seg button.on{ background:#1a1a1a; color:#fff; }
  .grid{ padding:16px; display:grid; grid-template-columns:1fr; gap:14px; max-width:560px; margin:0 auto; }
  @media(min-width:640px){ .grid{ grid-template-columns:1fr 1fr; max-width:900px; } }
  .card{ background:var(--sidebar-bg); border:1px solid var(--border); border-radius:14px; padding:16px 16px 12px;
    box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .plate{ display:flex; align-items:center; justify-content:center; gap:9px; padding:12px 14px; border-radius:9px;
    background:#ecebe4; border:1px solid rgba(0,0,0,.10);
    box-shadow:inset 0 1px 3px rgba(0,0,0,.20), inset 0 -1px 2px rgba(255,255,255,.55), 0 1px 0 rgba(255,255,255,.85); }
  .plate img{ width:30px; height:30px; border-radius:7px; flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.3), 0 1px 2px rgba(0,0,0,.25); }
  .plate .wm{ color:var(--text); text-shadow:0 1px 0 rgba(255,255,255,.7); line-height:1; white-space:nowrap; }
  .meta{ display:flex; justify-content:space-between; align-items:center; margin-top:11px; }
  .fname{ font-size:13px; font-weight:700; }
  .ftag{ font-size:10px; color:var(--muted); }
  .num{ font-size:10px; color:#fff; background:#7a45e0; border-radius:20px; padding:2px 8px; font-weight:700; }
  footer{ text-align:center; font-size:12px; color:var(--muted); padding:20px; }
</style>
</head>
<body>
<header>
  <h1>Prova font — logotipo Quadra</h1>
  <p class="sub">Scegli il font che ti piace, calibra spaziatura e dimensione, poi dimmi il numero.</p>
  <div class="controls">
    <div class="ctrl">
      <label>Maiuscolo</label>
      <div class="seg" id="case-seg">
        <button data-case="upper" class="on">QUADRA</button>
        <button data-case="title">Quadra</button>
      </div>
    </div>
    <div class="ctrl">
      <label>Spaziatura · <span class="val" id="ls-val">0.16em</span></label>
      <input type="range" id="ls" min="0" max="30" value="16">
    </div>
    <div class="ctrl">
      <label>Dimensione · <span class="val" id="fs-val">16px</span></label>
      <input type="range" id="fs" min="13" max="24" value="16">
    </div>
  </div>
</header>

<div class="grid" id="grid"></div>
<footer>Le stesse impostazioni valgono per la sidebar reale · icona e placca come nell'app</footer>

<script>
  var ICON = "https://fly98.github.io/Analisi/icons/icon-192.png";
  var fonts = [
    { name:"Space Grotesk", css:"'Space Grotesk'", w:600, tag:"geometrico · attuale" },
    { name:"Sora",          css:"'Sora'",          w:600, tag:"pulito, neutro" },
    { name:"Outfit",        css:"'Outfit'",        w:600, tag:"geometrico morbido" },
    { name:"Manrope",       css:"'Manrope'",       w:700, tag:"semi-geometrico" },
    { name:"Syne",          css:"'Syne'",          w:700, tag:"distintivo, design" },
    { name:"Unbounded",     css:"'Unbounded'",     w:600, tag:"largo, deciso" },
    { name:"Bricolage Grotesque", css:"'Bricolage Grotesque'", w:700, tag:"trendy, carattere" },
    { name:"Instrument Sans", css:"'Instrument Sans'", w:600, tag:"moderno sobrio" },
    { name:"Familjen Grotesk", css:"'Familjen Grotesk'", w:600, tag:"grotesque nordico" },
    { name:"Onest",         css:"'Onest'",         w:700, tag:"neutro contemporaneo" },
    { name:"Archivo",       css:"'Archivo'",       w:700, tag:"grottesco solido" },
    { name:"Space Mono",    css:"'Space Mono'",    w:700, tag:"mono · ledger/tech" },
    { name:"DM Mono",       css:"'DM Mono'",       w:500, tag:"mono elegante" },
    { name:"Chivo Mono",    css:"'Chivo Mono'",    w:600, tag:"mono compatto" },
    { name:"Sometype Mono", css:"'Sometype Mono'", w:700, tag:"mono caldo" },
    { name:"Michroma",      css:"'Michroma'",      w:400, tag:"mono-largo, sci-fi" }
  ];

  var state = { case:"upper", ls:0.16, fs:16 };

  function build(){
    var g = document.getElementById('grid');
    g.innerHTML = fonts.map(function(f,i){
      return '<div class="card">'+
        '<div class="plate">'+
          '<img src="'+ICON+'" alt="">'+
          '<span class="wm" data-wm style="font-family:'+f.css+',sans-serif;font-weight:'+f.w+'"></span>'+
        '</div>'+
        '<div class="meta"><div><span class="fname">'+f.name+'</span> <span class="ftag">· '+f.tag+'</span></div>'+
        '<span class="num">'+(i+1)+'</span></div>'+
      '</div>';
    }).join('');
    apply();
  }
  function apply(){
    var word = state.case==="upper" ? "QUADRA" : "Quadra";
    document.querySelectorAll('[data-wm]').forEach(function(el){
      el.textContent = word;
      el.style.textTransform = "none";
      el.style.letterSpacing = state.ls+"em";
      el.style.fontSize = state.fs+"px";
    });
    document.getElementById('ls-val').textContent = state.ls.toFixed(2)+"em";
    document.getElementById('fs-val').textContent = state.fs+"px";
  }
  document.getElementById('ls').addEventListener('input', function(e){ state.ls = e.target.value/100; apply(); });
  document.getElementById('fs').addEventListener('input', function(e){ state.fs = +e.target.value; apply(); });
  document.getElementById('case-seg').addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    state.case = b.dataset.case;
    this.querySelectorAll('button').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on'); apply();
  });
  build();
</script>
</body>
</html>
