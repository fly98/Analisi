<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110f; --bg2:#1d1916; --bg3:#272220;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
    --text:#f3ede6; --muted:#9a8f85; --faint:#5f574f;
    --amber:#ffb74d; --amber-glow:#ff9d2f;
    --blue:#7cc4ff; --teal:#5eddc4; --green:#6ee7a0; --red:#ff6b6b;
    --r:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,157,47,.06), transparent 60%),
      var(--bg);
    color:var(--text); font-family:'DM Sans',system-ui,sans-serif;
    padding-bottom:48px; min-height:100vh;
  }
  .wrap{max-width:760px; margin:0 auto; padding:0 16px}

  /* Header */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(var(--bg) 70%, transparent);
    padding:14px 0 10px; margin-bottom:4px;
  }
  .hrow{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
  .brand{font-size:30px; font-weight:700; letter-spacing:-.02em}
  .brand .dot{color:var(--amber)}
  .reload{
    font-family:'DM Mono',monospace; font-size:12px; color:var(--muted);
    background:var(--bg2); border:1px solid var(--line); border-radius:999px;
    padding:7px 12px; cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .reload:active{background:var(--bg3)}
  .reload.spin svg{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .summary{
    display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;
    font-family:'DM Mono',monospace; font-size:12.5px;
  }
  .chip{
    display:flex; align-items:center; gap:7px;
    background:var(--bg2); border:1px solid var(--line);
    padding:7px 12px; border-radius:999px; color:var(--muted);
  }
  .chip b{color:var(--text); font-weight:500}
  .chip.lit{border-color:rgba(255,157,47,.35); color:var(--amber)}
  .chip.lit b{color:var(--amber)}
  .chip .av{width:7px;height:7px;border-radius:50%}
  .av.home{background:var(--green); box-shadow:0 0 8px var(--green)}
  .av.away{background:var(--faint)}

  /* Sections */
  .room{margin-top:22px}
  .room-h{
    display:flex; align-items:center; gap:10px; margin:0 2px 11px;
  }
  .room-h .t{font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
  .room-h .ln{flex:1; height:1px; background:var(--line)}
  .room-h .n{font-family:'DM Mono',monospace; font-size:11px; color:var(--faint)}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr 1fr}}

  /* Tile */
  .tile{
    position:relative; overflow:hidden;
    background:var(--bg2); border:1px solid var(--line);
    border-radius:var(--r); padding:13px 14px; min-height:92px;
    display:flex; flex-direction:column; justify-content:space-between;
    cursor:pointer; transition:border-color .2s, background .2s, transform .08s;
  }
  .tile:active{transform:scale(.985)}
  .tile.on{border-color:rgba(255,157,47,.4)}
  .tile.on::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(120px 90px at 22px 22px, rgba(255,157,47,.20), transparent 70%);
    pointer-events:none;
  }
  .tile.sw.on{border-color:rgba(124,196,255,.4)}
  .tile.sw.on::before{background:radial-gradient(120px 90px at 22px 22px, rgba(124,196,255,.16), transparent 70%)}
  .tile.off-dev{opacity:.42; cursor:default}
  .tile .ico{
    width:34px;height:34px;border-radius:11px; display:grid; place-items:center;
    background:var(--bg3); color:var(--muted); transition:.2s;
  }
  .tile.on .ico{background:rgba(255,157,47,.16); color:var(--amber)}
  .tile.sw.on .ico{background:rgba(124,196,255,.14); color:var(--blue)}
  .tile .nm{font-size:14px; font-weight:500; line-height:1.25; margin-top:8px}
  .tile .st{font-family:'DM Mono',monospace; font-size:11px; color:var(--faint); margin-top:2px}
  .tile.on .st{color:var(--amber)}
  .tile.sw.on .st{color:var(--blue)}

  /* brightness slider */
  .bri{margin-top:9px; display:flex; align-items:center; gap:9px}
  .bri input[type=range]{
    -webkit-appearance:none; appearance:none; height:4px; border-radius:9px; flex:1;
    background:linear-gradient(90deg,var(--amber) var(--p,60%),var(--bg3) var(--p,60%));
  }
  .bri input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px;height:16px;border-radius:50%;
    background:var(--amber); box-shadow:0 0 10px rgba(255,157,47,.6); cursor:pointer;
  }
  .bri .pc{font-family:'DM Mono',monospace; font-size:11px; color:var(--amber); width:30px; text-align:right}

  /* Climate tile */
  .ctile{grid-column:span 2; min-height:0}
  @media(min-width:560px){.ctile{grid-column:span 1}}
  .ctile .row{display:flex; align-items:center; justify-content:space-between; width:100%}
  .ctile .temp{font-family:'DM Mono',monospace; font-size:13px; color:var(--text)}
  .ctile.on .ico{background:rgba(94,221,196,.14); color:var(--teal)}
  .ctile.on{border-color:rgba(94,221,196,.4)}
  .ctile.on::before{background:radial-gradient(120px 90px at 22px 22px, rgba(94,221,196,.14), transparent 70%)}
  .stepper{display:flex; align-items:center; gap:0; margin-top:11px; border:1px solid var(--line2); border-radius:12px; overflow:hidden}
  .stepper button{
    flex:1; background:var(--bg3); color:var(--text); border:none; padding:9px 0;
    font-size:18px; cursor:pointer; font-family:'DM Mono',monospace;
  }
  .stepper button:active{background:var(--bg)}
  .stepper .val{flex:1.4; text-align:center; font-family:'DM Mono',monospace; font-size:15px; color:var(--teal); padding:0 4px}
  .pwr{
    margin-top:9px; width:100%; text-align:center; padding:8px;
    border-radius:11px; border:1px solid var(--line2); background:var(--bg3);
    color:var(--muted); font-size:12.5px; font-weight:500; cursor:pointer; font-family:'DM Sans';
  }
  .pwr.on{background:rgba(94,221,196,.16); border-color:rgba(94,221,196,.4); color:var(--teal)}

  /* Security */
  .sec{background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); padding:4px 16px; margin-top:22px}
  .sec summary{
    list-style:none; cursor:pointer; padding:13px 0; display:flex; align-items:center; gap:10px;
    font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted);
  }
  .sec summary::-webkit-details-marker{display:none}
  .sec summary .ic{color:var(--red)}
  .sec summary .ar{margin-left:auto; transition:.2s; color:var(--faint)}
  .sec[open] summary .ar{transform:rotate(180deg)}
  .secrow{display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-top:1px solid var(--line); font-size:14px}
  .secrow .s{font-family:'DM Mono',monospace; font-size:11px; padding:3px 9px; border-radius:999px; background:var(--bg3); color:var(--muted)}
  .secrow .s.alert{background:rgba(255,107,107,.16); color:var(--red)}

  /* states */
  .loading,.errbox{text-align:center; padding:60px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px}
  .errbox{color:var(--red)}
  .errbox button{margin-top:14px; background:var(--bg2); color:var(--text); border:1px solid var(--line2); border-radius:11px; padding:9px 18px; cursor:pointer}
  .foot{text-align:center; margin-top:30px; font-family:'DM Mono',monospace; font-size:11px; color:var(--faint)}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--bg3); border:1px solid var(--line2); color:var(--text);
    padding:11px 18px; border-radius:13px; font-size:13px; opacity:0; pointer-events:none;
    transition:.25s; z-index:50; box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  #toast.err{border-color:rgba(255,107,107,.5)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hrow">
      <div class="brand">Casa<span class="dot">.</span></div>
      <button class="reload" id="reload" onclick="load()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
        <span id="ago">—</span>
      </button>
    </div>
    <div class="summary" id="summary"></div>
  </header>
  <div id="app"><div class="loading">Carico lo stato della casa…</div></div>
  <div class="foot" id="foot"></div>
</div>
<div id="toast"></div>

<script>
const WORKER = "https://ha-worker.f-castiglioni.workers.dev";
const KEY = ""; // quando metteremo in sicurezza il worker, qui va la chiave

// ── Ordine e classificazione stanze (provvisoria fino alla piantina) ──
const ROOM_ORDER = ["Camera","Bambine","Cucina","Salone","Studio","Giardino","Spa","Lavanderia","Altro"];
function roomOf(id, name){
  const s = (id+" "+name).toLowerCase();
  if(/filippo|mena|letto|comodino|luna|^light\.camera|\bcamera\b/.test(s) && !/cucina/.test(s)) return "Camera";
  if(/bambine|alessia|viola/.test(s)) return "Bambine";
  if(/cucina/.test(s)) return "Cucina";
  if(/salone|divano|\btv\b|pranzo|tavolo|quadro|osram|tenda/.test(s)) return "Salone";
  if(/scrivania|ikea|muro|faretto/.test(s)) return "Studio";
  if(/giardino|patio|cancello/.test(s)) return "Giardino";
  if(/spa|wellis/.test(s)) return "Spa";
  if(/lavanderia|asciugatrice/.test(s)) return "Lavanderia";
  return "Altro";
}

// Switch che ha senso mostrare (no "non disturbare", auto-update, watering, debug)
function switchUseful(id, name){
  const s=(id+" "+name).toLowerCase();
  if(/non disturbare|non_disturbare|auto.?update|wrinkle|watering|chirps|hue motion|motion_sensor|illuminance|entertainment|coming|leaving/.test(s)) return false;
  if(/siren|sirena|panic|allarme|casa_|live_stream|event_stream|motion_detection|motion_warning|camera_cucina/.test(s)) return false; // → sezione sicurezza
  return true;
}
function isSecurity(id,name){
  const s=(id+" "+name).toLowerCase();
  return /siren|sirena|panic|allarme|casa_panic|casa_siren|motion_detection|motion_warning/.test(s);
}

const svg = {
  light:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 1 4 10.5c-.7.7-1 1.4-1 2.5H9c0-1.1-.3-1.8-1-2.5A6 6 0 0 1 12 3z"/></svg>',
  plug:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6M15 2v6M7 8h10v3a5 5 0 0 1-10 0V8zM12 16v6"/></svg>',
  gate:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13M3 21h18M9 21v-6h6v6"/></svg>',
  fan:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 10c0-4 1-7 0-7s-3 2-3 5M14 12c4 0 7-1 7 0s-2 3-5 3M12 14c0 4-1 7 0 7s3-2 3-5M10 12c-4 0-7 1-7 0s2-3 5-3"/></svg>',
  climate:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V5a2 2 0 0 0-4 0v9.76a4 4 0 1 0 4 0z"/></svg>',
  ac:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="9" rx="2"/><path d="M6 18v1M10 18v2M14 18v2M18 18v1"/></svg>',
  shield:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg>',
};
function iconFor(e){
  const s=(e.id+" "+e.name).toLowerCase();
  if(e._t==='climate') return /condizion|^climate\.aria|\bac\b/.test(s)?svg.ac:svg.climate;
  if(/cancello/.test(s)) return svg.gate;
  if(/ventola|fan|tenda/.test(s)) return svg.fan;
  if(e._t==='switch') return svg.plug;
  return svg.light;
}

let DATA=null, lastTs=0, agoTimer=null;

async function api(path, opts={}){
  const h = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(KEY) h['X-API-Key']=KEY;
  const r = await fetch(WORKER+path, Object.assign({}, opts, {headers:h}));
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
async function call(domain, service, entity_id, data={}){
  try{
    await api('/call', {method:'POST', body:JSON.stringify({domain, service, entity_id, data})});
    toast('Fatto');
    setTimeout(load, 700);
  }catch(e){ toast('Errore: '+e.message, true); }
}

async function load(){
  const rb=document.getElementById('reload'); rb.classList.add('spin');
  try{
    const d = await api('/dump');
    DATA=d; lastTs=Date.now();
    render(d);
    startAgo();
  }catch(e){
    document.getElementById('app').innerHTML =
      '<div class="errbox">Non riesco a raggiungere la casa.<br>'+e.message+
      '<br><button onclick="load()">Riprova</button></div>';
  }finally{ rb.classList.remove('spin'); }
}

function tileLight(e){
  const on = e.state==='on';
  const dimmable = e.brightness!=null;
  const pct = dimmable ? Math.round(e.brightness/255*100) : 0;
  let bri='';
  if(on && dimmable){
    bri=`<div class="bri" onclick="event.stopPropagation()">
      <input type="range" min="1" max="100" value="${pct}" style="--p:${pct}%"
        oninput="this.style.setProperty('--p',this.value+'%');this.nextElementSibling.textContent=this.value+'%'"
        onchange="setBri('${e.id}',this.value)">
      <span class="pc">${pct}%</span></div>`;
  }
  return `<div class="tile ${on?'on':''}" onclick="toggle('light','${e.id}','${e.state}')">
    <div class="ico">${iconFor(e)}</div>
    <div>
      <div class="nm">${e.name}</div>
      <div class="st">${on?'Accesa':'Spenta'}</div>
      ${bri}
    </div></div>`;
}
function tileSwitch(e){
  const on = e.state==='on';
  return `<div class="tile sw ${on?'on':''}" onclick="toggle('switch','${e.id}','${e.state}')">
    <div class="ico">${iconFor(e)}</div>
    <div><div class="nm">${e.name}</div>
    <div class="st">${on?'Attivo':'Spento'}</div></div></div>`;
}
function tileClimate(e){
  const on = e.state!=='off';
  const hasTarget = e.target!=null;
  const curr = e.temp!=null ? e.temp+'°' : '—';
  return `<div class="tile ctile ${on?'on':''}">
    <div class="row">
      <div class="ico">${iconFor(e)}</div>
      <div class="temp">${curr}</div>
    </div>
    <div class="nm" style="margin-top:8px">${e.name}</div>
    ${hasTarget?`<div class="stepper">
      <button onclick="setTemp('${e.id}',${e.target},-0.5)">−</button>
      <div class="val">${e.target}°</div>
      <button onclick="setTemp('${e.id}',${e.target},0.5)">+</button>
    </div>`:`<div class="st" style="margin-top:8px">${on?'Acceso':'Spento'} · lettura ${curr}</div>`}
    <div class="pwr ${on?'on':''}" onclick="powerClimate('${e.id}','${e.state}','${(e.id+e.name).toLowerCase()}')">${on?'Acceso':'Spegni / Accendi'}</div>
  </div>`;
}

function render(d){
  // presenze + summary
  const litCount = d.lights.filter(l=>l.state==='on').length;
  const persons = (d.persons||[]).filter(p=>!/_2$/.test(p.id)); // dedup doppione
  const homeCount = persons.filter(p=>p.state==='home').length;
  const spa = (d.climate||[]).find(c=>/spa|wellis/.test((c.id+c.name).toLowerCase()));
  let sum = `<div class="chip ${litCount?'lit':''}"><span>💡</span><b>${litCount}</b> luci accese</div>`;
  sum += `<div class="chip"><b>${homeCount}</b>/${persons.length} in casa</div>`;
  if(spa) sum += `<div class="chip"><span>🛁</span> spa <b>${spa.temp??'—'}°</b></div>`;
  document.getElementById('summary').innerHTML = sum;

  // raggruppa entità controllabili
  const rooms = {};
  const push=(t,e)=>{ const r=roomOf(e.id,e.name); (rooms[r]=rooms[r]||[]).push({...e,_t:t}); };
  d.lights.forEach(e=>push('light',e));
  (d.switches||[]).filter(e=>switchUseful(e.id,e.name)).forEach(e=>push('switch',e));
  (d.climate||[]).forEach(e=>push('climate',e));

  let html='';
  for(const room of ROOM_ORDER){
    const items=rooms[room]; if(!items||!items.length) continue;
    // ordina: disponibili prima, climate in coda
    items.sort((a,b)=>{
      const ua=a.state==='unavailable', ub=b.state==='unavailable';
      if(ua!==ub) return ua?1:-1;
      if((a._t==='climate')!==(b._t==='climate')) return a._t==='climate'?1:-1;
      return 0;
    });
    html+=`<section class="room"><div class="room-h"><span class="t">${room}</span><span class="ln"></span><span class="n">${items.filter(i=>i.state!=='unavailable').length}</span></div><div class="grid">`;
    for(const e of items){
      if(e.state==='unavailable'){
        html+=`<div class="tile off-dev"><div class="ico">${iconFor(e)}</div><div><div class="nm">${e.name}</div><div class="st">offline</div></div></div>`;
      }else if(e._t==='light') html+=tileLight(e);
      else if(e._t==='switch') html+=tileSwitch(e);
      else if(e._t==='climate') html+=tileClimate(e);
    }
    html+='</div></section>';
  }

  // sicurezza
  const sec=[...(d.switches||[])].filter(e=>isSecurity(e.id,e.name) && e.state!=='unavailable');
  if(sec.length){
    let rows='';
    for(const e of sec){
      const alert=e.state==='on' && /siren|panic/.test((e.id+e.name).toLowerCase());
      const motion=/motion_detection|motion_warning/.test((e.id+e.name).toLowerCase());
      rows+=`<div class="secrow"><span>${e.name}</span>`;
      if(motion){
        rows+=`<span class="s" style="cursor:pointer" onclick="toggle('switch','${e.id}','${e.state}')">${e.state==='on'?'attivo':'spento'} ⟲</span>`;
      }else{
        rows+=`<span class="s ${alert?'alert':''}">${e.state==='on'?'ATTIVO':'ok'}</span>`;
      }
      rows+='</div>';
    }
    html+=`<details class="sec"><summary><span class="ic">${svg.shield}</span> Sicurezza
      <span class="ar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span></summary>
      ${rows}
      <div class="secrow" style="border:none"><span style="color:var(--faint);font-size:12px">Sirene e panico solo in lettura — si gestiscono da Home Assistant.</span></div>
    </details>`;
  }

  document.getElementById('app').innerHTML = html;
  document.getElementById('foot').innerHTML = `${d.total} entità · placement provvisorio in attesa della piantina`;
}

// azioni
function toggle(domain, id, state){
  const svc = state==='on' ? 'turn_off' : 'turn_on';
  // optimistic
  const t=event.currentTarget; if(t&&t.classList) t.classList.toggle('on');
  call(domain, svc, id);
}
function setBri(id, val){ call('light','turn_on',id,{brightness_pct:parseInt(val)}); }
function setTemp(id, cur, delta){ call('climate','set_temperature',id,{temperature: Math.round((cur+delta)*2)/2}); }
function powerClimate(id, state, key){
  const on = state!=='off';
  if(on){ call('climate','set_hvac_mode',id,{hvac_mode:'off'}); }
  else{
    const mode = /condizion|aria/.test(key) ? 'cool' : 'heat';
    call('climate','set_hvac_mode',id,{hvac_mode:mode});
  }
}

// "ago" timer
function startAgo(){
  clearInterval(agoTimer);
  const upd=()=>{ const s=Math.round((Date.now()-lastTs)/1000);
    document.getElementById('ago').textContent = s<5?'ora':(s<60?s+'s':Math.round(s/60)+'m'); };
  upd(); agoTimer=setInterval(upd,1000);
}
let toastT;
function toast(msg, err){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='show'+(err?' err':''); clearTimeout(toastT);
  toastT=setTimeout(()=>t.className='',1600);
}

load();
setInterval(()=>{ if(!document.hidden) load(); }, 20000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) load(); });
</script>
</body>
</html>
