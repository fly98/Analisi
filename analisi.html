<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>InternoUno · Analisi corrispettivi</title>
<link rel="icon" type="image/png" sizes="192x192" href="fisco-icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="fisco-icon-180.png">
<meta name="apple-mobile-web-app-title" content="Analisi">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#12283f; --muted:#657896; --line:#dde3ec; --bg:#eef1f5; --surface:#fff;
  --ok:#0d6e5e; --ok-bg:#e3f3ef; --warn:#9a6a10; --warn-bg:#fdf0dc;
  --danger:#b03a2e; --info:#2b5fb3; --info-bg:#e8effb; --radius:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  padding-bottom:60px
}
header{
  background:var(--ink);color:#fff;padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px));
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  position:sticky;top:0;z-index:20
}
.htop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
h1{font-size:17px;margin:0;font-weight:650}
.sub{font-size:12px;color:#c3d2e6}
main{max-width:1180px;margin:0 auto;padding:16px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:11px;text-align:center}
.kpi b{display:block;font-size:21px;letter-spacing:-.4px}
.kpi span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi.ok b{color:var(--ok)} .kpi.warn b{color:var(--warn)}

.barra{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
button.act{
  font:inherit;font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:9px;
  border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer
}
button.act.primary{background:var(--ink);border-color:var(--ink);color:#fff}
button.act.ok{background:var(--ok);border-color:var(--ok);color:#fff}
input[type=file]{display:none}

.gruppo{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.gtitolo{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:12px 14px;background:#f7f9fc;border-bottom:1px solid var(--line);cursor:pointer
}
.gtitolo .nome{font-weight:700;font-size:14.5px}
.gtitolo .conta{font-size:12px;color:var(--muted);font-weight:500}
.gtitolo .tot{font-weight:700;font-size:15px;white-space:nowrap}
.gtitolo .freccia{color:var(--muted);font-size:12px;transition:transform .15s}
.gruppo.chiuso .freccia{transform:rotate(-90deg)}
.gruppo.chiuso table{display:none}

table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line);font-weight:650
}
td{padding:8px 10px;border-bottom:1px solid #f0f3f7;vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.escluso td{opacity:.4;text-decoration:line-through}
tr.escluso td:first-child{opacity:1;text-decoration:none}
.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
input[type=checkbox]{width:19px;height:19px;accent-color:var(--ok);cursor:pointer;margin:0}
.badge{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:999px;background:var(--info-bg);color:var(--info)}
.vers{font-size:11px;color:var(--ok);margin-top:2px;line-height:1.35}
.vers .tassa{color:var(--muted)}
.vers .quando{color:var(--muted);font-size:10.5px}
.camera{
  display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;
  border-radius:5px;font-size:10.5px;font-weight:700;color:#fff;margin-right:3px
}
.camera.num2{background:#fff;color:#41503a;border:1.4px solid #5c6b52}

.riepilogo{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:14px
}
.riga-tot{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.riga-tot.finale{border-top:2px solid var(--ink);margin-top:8px;padding-top:10px;font-weight:700;font-size:16px}
.avviso{
  background:var(--warn-bg);border:1px solid #f0dcb8;border-radius:var(--radius);
  padding:12px 14px;font-size:13px;margin-bottom:14px
}
.vuoto{text-align:center;color:var(--muted);padding:40px 20px}
.caricamento{text-align:center;color:var(--muted);padding:30px}

@media(max-width:640px){
  main{padding:12px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  th:nth-child(4),td:nth-child(4),
  th:nth-child(5),td:nth-child(5){display:none}
  .gtitolo{padding:11px}
}
</style>
</head>
<body>

<header>
  <div class="htop">
    <div>
      <h1>Analisi corrispettivi</h1>
      <div class="sub" id="periodo">caricamento…</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="act" id="apri-file" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff">Carica pagamenti</button>
      <button class="act" id="torna" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff">Cassa</button>
    </div>
  </div>
</header>

<input type="file" id="file" accept=".xlsx,.xls">

<main>
  <div class="kpis" id="kpis"></div>
  <div id="avviso"></div>
  <div class="barra">
    <button class="act" id="tutti">Seleziona tutto</button>
    <button class="act" id="nessuno">Deseleziona tutto</button>
    <button class="act ok" id="genera">Prepara documento</button>
  </div>
  <div id="riepilogo"></div>
  <div id="gruppi"><div class="caricamento">Caricamento prenotazioni…</div></div>
</main>

<script>
const API = 'https://fisco-worker.f-castiglioni.workers.dev';
const $ = s => document.querySelector(s);
const eur = n => (n||0).toLocaleString('it-IT',{style:'currency',currency:'EUR'});
const gg = i => i ? i.slice(8,10)+'/'+i.slice(5,7) : '';
const ggl = i => i ? i.slice(8,10)+'/'+i.slice(5,7)+'/'+i.slice(2,4) : '';

let TOKEN = localStorage.getItem('fisco_token') || '';
let RIGHE = [];        // prenotazioni senza documento
let PAGAMENTI = {};    // id prenotazione -> {metodi:[], totale}
let ESCLUSI = new Set(JSON.parse(localStorage.getItem('analisi_esclusi') || '[]'));

const CAMERE = {
  'Gialla':{l:'G',c:'#e0a92e'}, 'Marrone':{l:'M',c:'#7a5230'}, 'Rossa':{l:'R',c:'#b03a2e'},
  'Verde':{l:'V',c:'#5c6b52'},  'Azzurra':{l:'A',c:'#5b8fb0'},
  'Uno':{l:'1'}, 'Due':{l:'2'}, 'Tre':{l:'3'}, 'Quattro':{l:'4'}, 'Cinque':{l:'5'}
};
function badge(lista){
  if(!lista || !lista.length) return '';
  return lista.map(n=>{
    const c = CAMERE[n];
    if(!c) return '';
    return c.c ? `<span class="camera" style="background:${c.c}">${c.l}</span>`
               : `<span class="camera num2">${c.l}</span>`;
  }).join('');
}

async function api(path){
  if(!TOKEN){
    TOKEN = prompt('Codice di accesso') || '';
    if(TOKEN) localStorage.setItem('fisco_token', TOKEN);
  }
  const r = await fetch(API + path + (path.includes('?')?'&':'?') + '_=' + Date.now(), {
    headers:{'X-Token':TOKEN}, cache:'no-store'
  });
  if(r.status === 401){ localStorage.removeItem('fisco_token'); TOKEN=''; throw new Error('codice non valido'); }
  const d = await r.json();
  if(!r.ok || d.error) throw new Error(d.error || ('errore '+r.status));
  return d;
}

async function carica(){
  const oggi = new Date().toISOString().slice(0,10);
  const dal = new Date().getFullYear() + '-01-01';
  try{
    const [d, pag] = await Promise.all([
      api(`/elenco?dal=${dal}&al=${oggi}`),
      api('/pagamenti').catch(()=>({pagamenti:{}}))
    ]);
    RIGHE = d.righe.filter(p => p.stato === 'da_emettere');
    if(pag && pag.pagamenti && Object.keys(pag.pagamenti).length) PAGAMENTI = pag.pagamenti;
    $('#periodo').textContent = `dal ${ggl(dal)} al ${ggl(oggi)} · ${RIGHE.length} prenotazioni senza documento`;
    render();
  }catch(e){
    $('#gruppi').innerHTML = `<div class="vuoto">Non riesco a caricare.<br><small>${e.message}</small></div>`;
  }
}

/* ---------- rapporto pagamenti ---------- */
$('#apri-file').onclick = ()=> $('#file').click();
$('#file').onchange = async (ev)=>{
  const f = ev.target.files[0];
  if(!f) return;
  const buf = await f.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const righe = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

  // cerco la riga di intestazione
  let start = -1, col = {};
  for(let i=0;i<Math.min(righe.length,40);i++){
    const r = righe[i].map(x=>String(x).trim().toLowerCase());
    const iTipo = r.indexOf('tipo');
    const iPren = r.findIndex(x=>x.includes('numero di prenotazione'));
    const iTot  = r.findIndex(x=>x.includes('totale'));
    const iData = r.indexOf('data');
    if(iTipo>=0 && iPren>=0){ start=i+1; col={tipo:iTipo, pren:iPren, tot:iTot, data:iData}; break; }
  }
  if(start<0){ alert('Non riconosco il formato del file.'); return; }

  PAGAMENTI = {};
  for(let i=start;i<righe.length;i++){
    const r = righe[i];
    const tipo = String(r[col.tipo]||'').trim();
    const id = String(r[col.pren]||'').trim().replace(/\.0$/,'');
    if(!tipo || !id || /totale|pagamenti/i.test(tipo)) continue;
    const imp = parseFloat(String(r[col.tot]||'0').replace(/[^\d,.-]/g,'').replace(',','.')) || 0;
    let dd = col.data>=0 ? String(r[col.data]||'').trim() : '';
    if(dd.includes(' ')) dd = dd.split(' ')[0];
    if(dd.includes('-') && dd.length>=10) dd = `${dd.slice(8,10)}/${dd.slice(5,7)}/${dd.slice(2,4)}`;
    (PAGAMENTI[id] = PAGAMENTI[id] || []).push({t:tipo, i:imp, d:dd});
  }
  render();
  try{
    await fetch(API + '/pagamenti', {
      method:'POST',
      headers:{'X-Token':TOKEN,'Content-Type':'application/json'},
      body: JSON.stringify(PAGAMENTI)
    });
  }catch(e){ /* resta comunque valido per questa sessione */ }
};

/* ---------- raggruppamento ---------- */
// Il metodo che conta è quello con cui è stata pagata la camera:
// i versamenti che coincidono con l'imposta di soggiorno vengono ignorati.
function metodoDi(p){
  const voci = PAGAMENTI[p.id];
  if(!voci || !voci.length) return 'Nessun pagamento registrato';

  const tassa = p.cityTax || 0;
  const camera = p.atteso || 0;

  // scarto i pagamenti riconducibili alla sola imposta di soggiorno:
  // importo pari alla tassa, oppure multiplo di 5 ben al di sotto della camera
  const utili = voci.filter(v => {
    const i = v.i || 0;
    if(i <= 0) return false;
    if(tassa > 0 && Math.abs(i - tassa) < 0.01) return false;
    if(i % 5 === 0 && camera > 0 && i <= Math.max(tassa, camera * 0.25)) return false;
    return true;
  });

  const scelti = utili.length ? utili : voci.filter(v => (v.i||0) > 0);
  if(!scelti.length) return 'Nessun pagamento registrato';

  // se un solo versamento copre quasi tutta la camera, è quello il metodo
  const grosso = scelti.filter(v => v.i >= camera * 0.6);
  const base = grosso.length ? grosso : scelti;

  return [...new Set(base.map(v => v.t))].sort().join(' + ');
}

function raggruppa(){
  const g = {};
  for(const p of RIGHE){
    const k = Object.keys(PAGAMENTI).length ? metodoDi(p) : (p.canale || '—');
    (g[k] = g[k] || []).push(p);
  }
  return Object.entries(g)
    .map(([nome, righe])=>({
      nome, righe: righe.sort((a,b)=> a.checkout < b.checkout ? -1 : 1),
      totale: righe.reduce((s,p)=> s + (ESCLUSI.has(p.id)?0:p.atteso), 0),
      totaleLordo: righe.reduce((s,p)=> s + p.atteso, 0),
      attivi: righe.filter(p=>!ESCLUSI.has(p.id)).length
    }))
    .sort((a,b)=> b.totaleLordo - a.totaleLordo);
}

function render(){
  const gruppi = raggruppa();
  const inclusi = RIGHE.filter(p=>!ESCLUSI.has(p.id));
  const totInc = inclusi.reduce((s,p)=>s+p.atteso,0);
  const totEsc = RIGHE.filter(p=>ESCLUSI.has(p.id)).reduce((s,p)=>s+p.atteso,0);

  $('#kpis').innerHTML = `
    <div class="kpi warn"><b>${inclusi.length}</b><span>Da segnalare</span></div>
    <div class="kpi warn"><b>${eur(totInc)}</b><span>Importo</span></div>
    <div class="kpi"><b>${ESCLUSI.size}</b><span>Escluse</span></div>
    <div class="kpi"><b>${eur(totEsc)}</b><span>Importo escluso</span></div>`;

  $('#avviso').innerHTML = Object.keys(PAGAMENTI).length ? '' :
    `<div class="avviso"><b>Rapporto pagamenti non caricato.</b><br>
     Le prenotazioni sono raggruppate per canale. Carica il rapporto da Amenitiz
     (Rapporti → Pagamenti registrati) per raggrupparle invece per metodo di incasso.</div>`;

  $('#riepilogo').innerHTML = `<div class="riepilogo">
    ${gruppi.map(g=>`<div class="riga-tot" style="${g.attivi?'':'opacity:.45'}">
        <span>${g.nome} <span style="color:var(--muted)">· ${g.attivi} di ${g.righe.length}</span></span>
        <span class="num">${eur(g.totale)}</span>
      </div>`).join('')}
    <div class="riga-tot finale"><span>Totale da segnalare</span><span class="num">${eur(totInc)}</span></div>
  </div>`;

  $('#gruppi').innerHTML = gruppi.length ? gruppi.map(g=>`
    <div class="gruppo" id="g-${btoa(unescape(encodeURIComponent(g.nome))).replace(/=/g,'')}">
      <div class="gtitolo">
        <div style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" ${g.attivi>0?'checked':''} onclick="event.stopPropagation();commutaGruppo('${g.nome.replace(/'/g,"\\'")}')"
                 title="Includi o escludi tutto il gruppo">
          <span onclick="this.closest('.gruppo').classList.toggle('chiuso')" style="cursor:pointer">
            <span class="freccia">▼</span>
            <span class="nome">${g.nome}</span>
            <span class="conta">· ${g.attivi} di ${g.righe.length}</span>
          </span>
        </div>
        <div class="tot">${eur(g.totale)}</div>
      </div>
      <table>
        <tr>
          <th style="width:34px"></th><th>Partenza</th><th>Ospite</th>
          <th>Camera</th><th>Canale</th><th class="num">Importo</th>
        </tr>
        ${g.righe.map(p=>`
          <tr class="${ESCLUSI.has(p.id)?'escluso':''}">
            <td><input type="checkbox" ${ESCLUSI.has(p.id)?'':'checked'} onchange="commuta('${p.id}')"></td>
            <td>${gg(p.checkout)}</td>
            <td>
              ${badge(p.camere)} ${p.nome || '<i style="color:var(--muted)">senza nome</i>'}
              <div class="vers">${dettaglioPag(p)}</div>
            </td>
            <td>${(p.camere||[]).join('+')}</td>
            <td><span class="badge">${p.canale}</span></td>
            <td class="num">${eur(p.atteso)}</td>
          </tr>`).join('')}
      </table>
    </div>`).join('') : '<div class="vuoto">Nessuna prenotazione senza documento.</div>';
}

// versamenti registrati, con la parte riferita alla tassa in grigio
function dettaglioPag(p){
  const voci = (PAGAMENTI[p.id] || []).filter(v => (v.i||0) > 0);
  if(!voci.length) return '<span class="tassa">nessun pagamento registrato</span>';
  const tassa = p.cityTax || 0, camera = p.atteso || 0;
  return voci.map(v=>{
    const soloTassa = (tassa && Math.abs(v.i - tassa) < 0.01) ||
                      (v.i % 5 === 0 && camera && v.i <= Math.max(tassa, camera*0.25));
    return `<span class="${soloTassa?'tassa':''}">${v.t} ${eur(v.i)}${v.d ? ' <span class="quando">'+v.d+'</span>' : ''}</span>`;
  }).join(' · ');
}

window.commutaGruppo = (nome)=>{
  const g = raggruppa().find(x=>x.nome===nome);
  if(!g) return;
  const daEscludere = g.attivi > 0;   // se ce n'è almeno una attiva, escludo tutto
  for(const p of g.righe){
    daEscludere ? ESCLUSI.add(p.id) : ESCLUSI.delete(p.id);
  }
  localStorage.setItem('analisi_esclusi', JSON.stringify([...ESCLUSI]));
  render();
};

window.commuta = (id)=>{
  ESCLUSI.has(id) ? ESCLUSI.delete(id) : ESCLUSI.add(id);
  localStorage.setItem('analisi_esclusi', JSON.stringify([...ESCLUSI]));
  render();
};

$('#tutti').onclick = ()=>{ ESCLUSI.clear(); localStorage.setItem('analisi_esclusi','[]'); render(); };
$('#nessuno').onclick = ()=>{
  ESCLUSI = new Set(RIGHE.map(p=>p.id));
  localStorage.setItem('analisi_esclusi', JSON.stringify([...ESCLUSI]));
  render();
};

$('#genera').onclick = ()=>{
  const gruppi = raggruppa();
  const righe = [['Metodo di incasso','Partenza','Arrivo','Ospite','Camera','Canale','Importo','Versamenti registrati']];
  for(const g of gruppi){
    for(const p of g.righe){
      if(ESCLUSI.has(p.id)) continue;
      const vers = (PAGAMENTI[p.id]||[]).filter(v=>(v.i||0)>0)
        .map(v=>`${v.t} ${v.i.toFixed(2).replace('.',',')}€${v.d?' del '+v.d:''}`).join(' · ');
      righe.push([g.nome, ggl(p.checkout), ggl(p.checkin), p.nome || 'senza nome',
                  (p.camere||[]).join('+'), p.canale, String(p.atteso.toFixed(2)).replace('.',','), vers]);
    }
    righe.push([g.nome+' — totale','','','','','', String(g.totale.toFixed(2)).replace('.',','), '']);
    righe.push([]);
  }
  const csv = righe.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'corrispettivi_per_metodo.csv';
  a.click();
};

$('#torna').onclick = ()=> location.href = 'fisco.html';

carica();
</script>
</body>
</html>
