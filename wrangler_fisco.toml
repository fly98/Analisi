name = "fisco-worker"
main = "fisco_worker.js"
compatibility_date = "2025-01-01"

# 10:00 emissione automatica · 13:00 promemoria di cio che resta
# (orari italiani in ora legale: UTC+2)
[triggers]
crons = ["0 8 * * *", "0 11 * * *"]

[[services]]
binding = "LS"
service = "little-shadow-145e"

[[services]]
binding = "TG"
service = "tg-worker"

[[kv_namespaces]]
binding = "FISCO_KV"
id = "1d8d7db930004f9eaa73e17af65b0957"
