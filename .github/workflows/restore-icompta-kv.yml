name: Restore iCompta KV from backup

# Ripristina il KV iCompta dalla copia off-site in icompta_backup/.
# Restore COMPLETO via _manifest.json (meta + tutti gli anni + regole/titoli/
# ricorrenze/sessioni EB). Fallback legacy meta+tx se il manifest non c'e'.

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Restore KV da icompta_backup/
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: node tools/kv_restore.js
