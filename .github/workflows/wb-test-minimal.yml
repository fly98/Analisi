name: WB Worker Test 5

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "base step"

      - name: Set admin key
        run: |
          npm install -g wrangler@3
          echo "${{ secrets.WB_ADMIN_KEY }}" | wrangler secret put WB_ADMIN_KEY --name wb-worker --config wrangler_wb_deploy.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Anthropic key (once provided)
        if: ${{ secrets.WB_ANTHROPIC_API_KEY != '' }}
        run: |
          npm install -g wrangler@3
          echo "${{ secrets.WB_ANTHROPIC_API_KEY }}" | wrangler secret put ANTHROPIC_API_KEY --name wb-worker --config wrangler_wb_deploy.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
