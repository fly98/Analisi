name: Deploy MP Worker

on:
  push:
    paths:
      - 'mp_worker.js'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create wrangler config
        run: |
          cat > wrangler_mp_deploy.toml << 'TOML'
          name = "fly-mp"
          main = "mp_worker.js"
          compatibility_date = "2024-12-01"

          [[durable_objects.bindings]]
          name = "ROOM"
          class_name = "Room"

          [[durable_objects.bindings]]
          name = "LOBBY"
          class_name = "Lobby"

          [[migrations]]
          tag = "v1"
          new_sqlite_classes = ["Room"]

          [[migrations]]
          tag = "v2"
          new_sqlite_classes = ["Lobby"]
          TOML

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config wrangler_mp_deploy.toml
