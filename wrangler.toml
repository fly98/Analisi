name = "little-shadow-145e"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "ARRIVI_KV"
id = "48138f095e8b43d2823c85580af22125"

# Service binding verso tg-worker: le fetch Worker->Worker via URL
# workers.dev sono bloccate da Cloudflare (errore 1042).
[[services]]
binding = "TG"
service = "tg-worker"

[triggers]
crons = ["0 4,10 * * *"]
