<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12283f">
<title>Ricevute · InternoUno</title>
<style>
:root{
  --bg:#eef1f5;
  --surface:#fff;
  --ink:#12283f;
  --muted:#657896;
  --line:#dde3ec;
  --ok:#0d6e5e;
  --ok-bg:#e3f3ef;
  --warn:#9a5b00;
  --warn-bg:#fdf0dc;
  --info:#2b4f8e;
  --info-bg:#e8eefb;
  --off:#6b7280;
  --off-bg:#eceef1;
  --danger:#b42318;
  --radius:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding-bottom:env(safe-area-inset-bottom);
}
header{
  background:var(--ink);color:#fff;padding:14px 16px calc(14px);
  padding-top:calc(14px + env(safe-area-inset-top));
  position:sticky;top:0;z-index:20;
}
.htop{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
h1{margin:0;font-size:17px;font-weight:650;letter-spacing:-.2px}
.sub{font-size:12px;color:#9db2cd}
.tabs{display:flex;gap:4px;margin-top:12px}
.tab{
  flex:1;padding:8px;border:0;border-radius:8px;font:inherit;font-size:13px;font-weight:600;
  background:rgba(255,255,255,.1);color:#c3d2e6;cursor:pointer;
}
.tab.on{background:#fff;color:var(--ink)}
main{padding:12px;max-width:1100px;margin:0 auto}

.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.seg{display:inline-flex;background:#e2e7ef;border-radius:9px;padding:2px}
.seg button{
  font:inherit;font-size:13px;font-weight:600;padding:6px 14px;border:0;border-radius:7px;
  background:transparent;color:var(--muted);cursor:pointer
}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(18,40,63,.12)}
.ctx{display:flex;align-items:center;gap:6px}
.ctx button{
  font:inherit;font-size:13.5px;font-weight:600;padding:7px 12px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);cursor:pointer
}
.ctx .nav{padding:7px 10px;font-size:15px;line-height:1}
.ctx .lbl{min-width:130px;text-align:center}
.ctx .info{font-size:13px;color:var(--muted)}

/* calendario a selezione intervallo */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head button{
  font:inherit;font-size:16px;padding:4px 12px;border:1px solid var(--line);border-radius:8px;
  background:#fff;cursor:pointer;line-height:1.2
}
.cal-head span{font-weight:650;font-size:14.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid .dow{
  font-size:10.5px;color:var(--muted);text-align:center;padding:4px 0;font-weight:650;
  text-transform:uppercase;letter-spacing:.3px
}
.cal-grid button{
  font:inherit;font-size:13px;aspect-ratio:1;border:0;border-radius:7px;background:#fff;
  color:var(--ink);cursor:pointer;padding:0
}
.cal-grid button.vuoto{background:transparent;cursor:default}
.cal-grid button.dentro{background:var(--info-bg);border-radius:0}
.cal-grid button.bordo{background:var(--ink);color:#fff;font-weight:650}
.cal-grid button.oggi{box-shadow:inset 0 0 0 1.5px var(--info)}
.cal-sel{font-size:12.5px;color:var(--muted);margin-top:10px;text-align:center}
.bar input[type=date]{
  font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)
}
button.act{
  font:inherit;font-weight:600;padding:8px 14px;border:0;border-radius:8px;
  background:var(--ink);color:#fff;cursor:pointer
}
button.act:disabled{opacity:.5}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px}
.kpi b{display:block;font-size:21px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kpi span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi.warn b{color:var(--warn)} .kpi.ok b{color:var(--ok)}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;
}
.card.da_emettere{border-left:4px solid var(--warn)}
.card.emessa{border-left:4px solid var(--ok)}
.card.fattura{border-left:4px solid var(--info)}
.card.esclusa{border-left:4px solid var(--off);opacity:.72}
.card.futura{border-left:4px solid var(--line)}
.p-futura{background:var(--off-bg);color:var(--muted)}

.row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.nome{font-weight:650;font-size:15px}
.meta{font-size:12.5px;color:var(--muted);margin-top:2px}
.eur{font-variant-numeric:tabular-nums;font-weight:650;font-size:16px;white-space:nowrap}
.eur small{display:block;font-weight:400;font-size:11px;color:var(--muted);text-align:right}

.pill{
  display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:650;
  letter-spacing:.2px;vertical-align:middle
}
.p-emessa{background:var(--ok-bg);color:var(--ok)}
.p-da_emettere{background:var(--warn-bg);color:var(--warn)}
.p-fattura{background:var(--info-bg);color:var(--info)}
.p-esclusa{background:var(--off-bg);color:var(--off)}
.canale{font-size:11px;color:var(--muted)}
.camere{display:inline-flex;gap:3px;vertical-align:middle;margin-right:6px}
.cam{
  display:inline-flex;align-items:center;justify-content:center;
  width:21px;height:21px;border-radius:6px;font-size:11.5px;font-weight:700;color:#fff;
  letter-spacing:-.2px
}
.cam.num{background:#fff;color:#41503a;border:1.5px solid #5c6b52}

.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.actions button{
  font:inherit;font-size:13px;font-weight:600;padding:7px 11px;border-radius:8px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink)
}
.actions button.primary{background:var(--ok);border-color:var(--ok);color:#fff}
.actions button.ghost{color:var(--muted)}
.actions button.danger{color:var(--danger);border-color:#f0c9c5}
.docinfo{
  margin-top:8px;font-size:12.5px;color:var(--muted);
  display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap
}
.docinfo code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink)}

.empty{text-align:center;padding:38px 16px;color:var(--muted)}
.loading{text-align:center;padding:30px;color:var(--muted)}
.hidden{display:none}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);font-size:13.5px}
th{background:#f7f9fc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
td.num{text-align:right;font-variant-numeric:tabular-nums}

dialog{
  border:0;border-radius:14px;padding:0;max-width:400px;width:92%;
  box-shadow:0 18px 50px rgba(10,25,45,.28)
}
dialog::backdrop{background:rgba(10,25,45,.45)}
.dlg{padding:18px}
.dlg h3{margin:0 0 4px;font-size:16px}
.dlg p{margin:0 0 14px;font-size:13.5px;color:var(--muted)}
.dlg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px}
.dlg input,.dlg select,.dlg textarea{
  width:100%;font:inherit;padding:9px;border:1px solid var(--line);border-radius:8px;background:#fff;
  resize:vertical
}
.dlg .btns{display:flex;gap:8px;margin-top:16px}
.dlg .btns button{flex:1;font:inherit;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:#fff}
.dlg .btns button.primary{background:var(--ok);color:#fff;border-color:var(--ok)}

#toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:99;
  background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s
}
#toast.show{opacity:1}
#toast.err{background:var(--danger)}

@media(min-width:760px){
  .row1{align-items:center}
  .card{padding:14px 16px}
}
</style>
</head>
<body>

<header>
  <div class="htop">
    <h1>Ricevute · InternoUno</h1>
    <span class="sub" id="periodo"></span>
  </div>
  <div class="tabs">
    <button class="tab on" data-view="operativo">Prenotazioni</button>
    <button class="tab" data-view="storico">Match storico</button>
  </div>
</header>

<main>
  <div class="bar">
    <div class="seg" id="seg">
      <button data-mode="mese" class="on">Mese</button>
      <button data-mode="range">Periodo</button>
      <button data-mode="tutto">Tutto</button>
    </div>
    <div class="ctx" id="ctx"></div>
  </div>
  <input type="hidden" id="dal"><input type="hidden" id="al">

  <!-- VISTA OPERATIVA -->
  <section id="v-operativo">
    <div class="kpis" id="kpis"></div>
    <div id="lista"><div class="loading">Caricamento…</div></div>
  </section>

  <!-- VISTA STORICO -->
  <section id="v-storico" class="hidden">
    <div class="kpis" id="kpis-st"></div>
    <h3 style="font-size:14px;margin:16px 0 8px">Ricevute senza prenotazione</h3>
    <div id="orfane"></div>
  </section>
</main>

<dialog id="cal">
  <div class="dlg">
    <h3>Scegli il periodo</h3>
    <p>Tocca il primo giorno, poi l’ultimo.</p>
    <div class="cal-head">
      <button type="button" id="cal-prev">‹</button>
      <span id="cal-mese"></span>
      <button type="button" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-sel" id="cal-sel"></div>
    <div class="btns">
      <button type="button" id="cal-no">Annulla</button>
      <button type="button" class="primary" id="cal-ok">Applica</button>
    </div>
  </div>
</dialog>

<dialog id="dlg">
  <form method="dialog" class="dlg">
    <h3 id="dlg-t"></h3>
    <p id="dlg-p"></p>
    <div id="dlg-body"></div>
    <div class="btns">
      <button value="no">Annulla</button>
      <button value="si" class="primary" id="dlg-ok">Conferma</button>
    </div>
  </form>
</dialog>

<div id="toast"></div>

<script>
const API = 'https://fisco-worker.f-castiglioni.workers.dev';
let TOKEN = localStorage.getItem('fisco_token') || '';
let DATI = null, VIEW = 'operativo';

const $ = s => document.querySelector(s);
const eur = n => (n ?? 0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const gg = iso => iso ? iso.slice(8,10)+'/'+iso.slice(5,7) : '';

function toast(msg, err){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' err' : '');
  setTimeout(()=>t.className='', 3200);
}

async function api(path, opt={}){
  const r = await fetch(API + path, {
    ...opt,
    headers:{'X-Token':TOKEN,'Content-Type':'application/json',...(opt.headers||{})}
  });
  if(r.status === 401){
    localStorage.removeItem('fisco_token');
    TOKEN = '';
    const e = new Error('Token non valido');
    e.auth = true;
    throw e;
  }
  const d = await r.json();
  if(!r.ok || d.ok === false) throw new Error(d.error || ('HTTP '+r.status));
  return d;
}

window.chiediToken = function(){
  const t = prompt('Token di accesso');
  if(t){ TOKEN = t.trim(); localStorage.setItem('fisco_token', TOKEN); return true; }
  return false;
}

/* ---------- selettore periodo ---------- */
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
let MODE = 'mese';
let meseSel = new Date().getMonth();
let annoSel = new Date().getFullYear();

const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const oggiIso = () => iso(new Date());

function applicaMese(){
  const primo = new Date(annoSel, meseSel, 1);
  const ultimo = new Date(annoSel, meseSel+1, 0);
  $('#dal').value = iso(primo);
  // non ha senso chiedere oltre oggi
  $('#al').value = iso(ultimo) > oggiIso() ? oggiIso() : iso(ultimo);
}

function applicaTutto(){
  $('#dal').value = new Date().getFullYear() + '-01-01';
  $('#al').value = oggiIso();
}

function renderCtx(){
  const c = $('#ctx');
  if(MODE === 'mese'){
    c.innerHTML = `<button class="nav" id="m-prev">‹</button>
      <button class="lbl" id="m-lbl">${MESI[meseSel]} ${annoSel}</button>
      <button class="nav" id="m-next">›</button>`;
    $('#m-prev').onclick = ()=>{ if(--meseSel<0){meseSel=11;annoSel--;} applicaMese(); renderCtx(); carica(); };
    $('#m-next').onclick = ()=>{ if(++meseSel>11){meseSel=0;annoSel++;} applicaMese(); renderCtx(); carica(); };
    $('#m-lbl').onclick = ()=>{ const o=new Date(); meseSel=o.getMonth(); annoSel=o.getFullYear(); applicaMese(); renderCtx(); carica(); };
  } else if(MODE === 'range'){
    c.innerHTML = `<button id="r-apri">${gg($('#dal').value)} → ${gg($('#al').value)}</button>`;
    $('#r-apri').onclick = apriCalendario;
  } else {
    c.innerHTML = `<span class="info">Dal 1 gennaio a oggi</span>`;
  }
}

document.querySelectorAll('#seg button').forEach(b => b.onclick = ()=>{
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  MODE = b.dataset.mode;
  if(MODE === 'mese'){ applicaMese(); renderCtx(); carica(); }
  else if(MODE === 'tutto'){ applicaTutto(); renderCtx(); carica(); }
  else { renderCtx(); apriCalendario(); }
});

/* ---------- calendario a intervallo ---------- */
let calMese, calAnno, calDa = null, calA = null;

function apriCalendario(){
  const base = $('#dal').value ? new Date($('#dal').value+'T12:00:00') : new Date();
  calMese = base.getMonth(); calAnno = base.getFullYear();
  calDa = $('#dal').value || null;
  calA  = $('#al').value || null;
  disegnaCal();
  $('#cal').showModal();
}

function disegnaCal(){
  $('#cal-mese').textContent = `${MESI[calMese]} ${calAnno}`;
  const primo = new Date(calAnno, calMese, 1);
  const giorni = new Date(calAnno, calMese+1, 0).getDate();
  const offset = (primo.getDay() + 6) % 7; // lunedi = 0

  let html = ['L','M','M','G','V','S','D'].map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++) html += '<button class="vuoto" disabled></button>';

  for(let g=1; g<=giorni; g++){
    const d = iso(new Date(calAnno, calMese, g));
    let cls = '';
    if(calDa && calA && d > calDa && d < calA) cls = 'dentro';
    if(d === calDa || d === calA) cls = 'bordo';
    if(d === oggiIso()) cls += ' oggi';
    html += `<button class="${cls}" data-d="${d}">${g}</button>`;
  }
  $('#cal-grid').innerHTML = html;

  $('#cal-grid').querySelectorAll('button[data-d]').forEach(b => b.onclick = ()=>{
    const d = b.dataset.d;
    if(!calDa || (calDa && calA)){ calDa = d; calA = null; }
    else if(d < calDa){ calA = calDa; calDa = d; }
    else { calA = d; }
    disegnaCal();
  });

  $('#cal-sel').textContent = calDa
    ? (calA ? `Dal ${gg(calDa)} al ${gg(calA)}` : `Inizio ${gg(calDa)} — scegli l\u2019ultimo giorno`)
    : 'Nessun giorno selezionato';
}

$('#cal-prev').onclick = ()=>{ if(--calMese<0){calMese=11;calAnno--;} disegnaCal(); };
$('#cal-next').onclick = ()=>{ if(++calMese>11){calMese=0;calAnno++;} disegnaCal(); };
$('#cal-no').onclick  = ()=> $('#cal').close();
$('#cal-ok').onclick  = ()=>{
  if(!calDa) return;
  $('#dal').value = calDa;
  $('#al').value  = calA || calDa;
  $('#cal').close();
  renderCtx();
  carica();
};

/* ---------- caricamento ---------- */
async function carica(){
  const dal = $('#dal').value, al = $('#al').value;
  $('#periodo').textContent = gg(dal)+' – '+gg(al)+' · v11';
  $('#lista').innerHTML = '<div class="loading">Caricamento…</div>';
  try{
    DATI = await api(`/elenco?dal=${dal}&al=${al}`);
    render();
  }catch(e){
    if(e.auth){
      $('#lista').innerHTML = `<div class="empty">Serve il token di accesso.<br>
        <button class="act" style="margin-top:12px" onclick="if(chiediToken())carica()">Inserisci token</button></div>`;
      return;
    }
    $('#lista').innerHTML = `<div class="empty">Non riesco a caricare i dati.<br><small>${e.message}</small></div>`;
  }
}

/* ---------- render ---------- */
function render(){
  if(!DATI) return;
  const r = DATI.riepilogo;
  $('#kpis').innerHTML = `
    <div class="kpi warn"><b>${r.daEmettere}</b><span>Da emettere</span></div>
    <div class="kpi ok"><b>${r.emesse}</b><span>Emesse</span></div>
    <div class="kpi"><b>${r.fattura}</b><span>Fattura</span></div>
    <div class="kpi"><b>${r.escluse}</b><span>Escluse</span></div>
    <div class="kpi"><b>${r.future||0}</b><span>Non arrivati</span></div>`;

  $('#kpis-st').innerHTML = `
    <div class="kpi"><b>${r.totali}</b><span>Prenotazioni</span></div>
    <div class="kpi ok"><b>${r.emesse}</b><span>Abbinate</span></div>
    <div class="kpi warn"><b>${r.daEmettere}</b><span>Scoperte</span></div>
    <div class="kpi"><b>${r.ricevuteOrfane}</b><span>Orfane</span></div>`;

  $('#lista').innerHTML = DATI.righe.length
    ? DATI.righe.map(riga).join('')
    : '<div class="empty">Nessuna prenotazione nel periodo.</div>';

  $('#orfane').innerHTML = DATI.orfane.length ? `<table>
    <tr><th>Numero</th><th>Data</th><th style="text-align:right">Importo</th></tr>
    ${DATI.orfane.map(o=>`<tr><td><code>${o.numero}</code></td><td>${o.data}</td><td class="num">${eur(o.importo)}</td></tr>`).join('')}
    </table>` : '<div class="empty">Nessuna ricevuta orfana.</div>';
}

const CAMERE = {
  'Gialla':{l:'G',c:'#e0a92e'}, 'Marrone':{l:'M',c:'#7a5230'}, 'Rossa':{l:'R',c:'#b03a2e'},
  'Verde':{l:'V',c:'#5c6b52'},  'Azzurra':{l:'A',c:'#5b8fb0'},
  'Uno':{l:'1'}, 'Due':{l:'2'}, 'Tre':{l:'3'}, 'Quattro':{l:'4'}, 'Cinque':{l:'5'}
};
const dataIt = iso => iso ? iso.slice(8,10)+'/'+iso.slice(5,7)+'/'+iso.slice(2,4) : '';
function descrizioneStandard(p){
  const n = (p.nome||'').trim();
  return `Soggiorno dal ${dataIt(p.checkin)} al ${dataIt(p.checkout)}` + (n ? ` del Sig./Sig.ra ${n}` : '');
}

function badgeCamere(lista){
  if(!lista || !lista.length) return '';
  return '<span class="camere">' + lista.map(n=>{
    const c = CAMERE[n];
    if(!c) return `<span class="cam num" title="${n}">?</span>`;
    return c.c
      ? `<span class="cam" style="background:${c.c}" title="${n}">${c.l}</span>`
      : `<span class="cam num" title="${n}">${c.l}</span>`;
  }).join('') + '</span>';
}

const ETICHETTA = {emessa:'Emessa', da_emettere:'Da emettere', fattura:'Fattura', esclusa:'Esclusa', futura:'Non arrivato'};

function riga(p){
  const doc = p.ricevuta;
  let azioni = '';
  if(p.stato === 'da_emettere'){
    azioni = `<div class="actions">
      <button class="primary" onclick="apriEmissione('${p.id}')">Emetti ricevuta</button>
      <button onclick="segna('${p.id}','fattura')">Segue fattura</button>
      <button class="ghost" onclick="segna('${p.id}','esclusa')">Non emettere</button>
    </div>`;
  } else if(p.stato === 'emessa'){
    const idt = doc && doc.id ? doc.id : '';
    azioni = `<div class="docinfo">
      <span>${doc ? 'Ricevuta <code>'+(doc.numero||'—')+'</code>' : ''}
        ${p.origine && p.origine.startsWith('match') ? '· abbinata automaticamente' : ''}</span>
    </div>
    ${idt ? `<div class="actions">
      <button onclick="vediPdf('${idt}')">Apri PDF</button>
      ${p.email ? `<button onclick="inviaMail('${p.id}','${idt}')">Invia email · ${linguaDa(p.telefono,p.lingua)}</button>` : ''}
      ${p.telefono ? `<button onclick="inviaWa('${p.id}','${idt}')">WhatsApp</button>` : ''}
      <button class="danger" onclick="annulla('${p.id}','${idt}')">Annulla ricevuta</button>
    </div>` : ''}`;
  } else if(p.stato === 'futura'){
    azioni = `<div class="docinfo">
      <span>Arrivo previsto il ${gg(p.checkin)}</span>
      <button class="ghost" style="font:inherit;font-size:12.5px;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer"
        onclick="apriEmissione('${p.id}')">Emetti in anticipo</button>
    </div>`;
  } else {
    azioni = `<div class="docinfo">
      <span>${p.stato==='fattura'?'Segnata come fattura elettronica':'Nessuna ricevuta da emettere'}</span>
      <button class="ghost" style="font:inherit;font-size:12.5px;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer"
        onclick="segna('${p.id}',null)">Riapri</button>
    </div>`;
  }

  return `<div class="card ${p.stato}">
    <div class="row1">
      <div>
        <div class="nome">${badgeCamere(p.camere)}${p.nome || 'Ospite senza nome'} <span class="pill p-${p.stato}">${ETICHETTA[p.stato]}</span></div>
        <div class="meta">${gg(p.checkin)} → ${gg(p.checkout)} · ${p.notti} ${p.notti==1?'notte':'notti'} · ${p.adulti} ad.${p.bambini?' + '+p.bambini+' b.':''}
          <span class="canale">· ${p.canale||'—'}</span></div>
      </div>
      <div class="eur">${eur(p.atteso)}<small>tot ${eur(p.totale)} − tassa ${eur(p.cityTax)}</small></div>
    </div>
    ${azioni}
  </div>`;
}

/* ---------- azioni ---------- */
function dialogo(titolo, testo, corpo, okLabel){
  $('#dlg-t').textContent = titolo;
  $('#dlg-p').textContent = testo;
  $('#dlg-body').innerHTML = corpo || '';
  $('#dlg-ok').textContent = okLabel || 'Conferma';
  const d = $('#dlg');
  d.showModal();
  return new Promise(res => d.addEventListener('close', ()=>res(d.returnValue==='si'), {once:true}));
}

window.apriEmissione = async (id) => {
  const p = DATI.righe.find(x=>x.id===id);
  const desc = p.descrizioneDefault || descrizioneStandard(p);
  const ok = await dialogo('Emetti ricevuta', `${p.nome} · ${gg(p.checkin)} → ${gg(p.checkout)}`,
    `<label>Descrizione sulla ricevuta</label>
     <textarea id="f-desc" rows="2">${desc.replace(/"/g,'&quot;')}</textarea>
     <label>Importo (camera, senza tassa di soggiorno)</label>
     <input type="number" step="0.01" id="f-imp" value="${p.atteso.toFixed(2)}">
     <label>Pagamento</label>
     <select id="f-pag">
       <option value="PE">Elettronico</option>
       <option value="PC">Contanti</option>
     </select>`, 'Emetti');
  if(!ok) return;
  const importo = parseFloat($('#f-imp').value);
  const pagamento = $('#f-pag').value;
  const descrizione = $('#f-desc').value.trim();
  toast('Emissione in corso…');
  try{
    const r = await api('/emetti', {method:'POST', body: JSON.stringify({
      id, importo, pagamento, descrizione, dal:$('#dal').value, al:$('#al').value })});
    toast('Ricevuta ' + (r.documento?.progressivo || 'emessa'));
    carica();
  }catch(e){ toast('Emissione non riuscita: '+e.message, true); }
};

window.segna = async (id, stato) => {
  if(stato){
    const t = stato==='fattura' ? 'Segue fattura elettronica' : 'Non emettere ricevuta';
    const msg = stato==='fattura'
      ? 'La prenotazione verrà chiusa: per questo soggiorno emetterai una fattura.'
      : 'La prenotazione verrà chiusa senza emissione di ricevuta.';
    if(!await dialogo(t, msg, '', 'Conferma')) return;
  }
  try{
    await api('/stato', {method:'POST', body: JSON.stringify({id, stato})});
    toast(stato ? 'Prenotazione chiusa' : 'Prenotazione riaperta');
    carica();
  }catch(e){ toast('Non riesco a salvare: '+e.message, true); }
};

async function linkRicevuta(id, idtrx){
  const p = DATI.righe.find(x=>x.id===id) || {};
  const r = await api('/condividi', {method:'POST', body: JSON.stringify({idtrx, nome:p.nome})});
  return r.link;
}

window.vediPdf = async (idtrx) => {
  toast('Preparo il PDF…');
  try{
    const r = await api('/condividi', {method:'POST', body: JSON.stringify({idtrx})});
    window.open(r.link, '_blank');
  }catch(e){ toast('Non riesco ad aprire il PDF: '+e.message, true); }
};

window.inviaMail = async (id, idtrx) => {
  const p = DATI.righe.find(x=>x.id===id);
  if(!await dialogo('Invia ricevuta per email',
      `Verrà inviata a ${p.email}`, '', 'Invia')) return;
  toast('Invio in corso…');
  try{
    await api('/invia', {method:'POST', body: JSON.stringify({
      idtrx, email:p.email, nome:p.nome, checkin:p.checkin, checkout:p.checkout,
      telefono:p.telefono, lingua:p.lingua })});
    toast('Ricevuta inviata a ' + p.email);
  }catch(e){ toast('Invio non riuscito: '+e.message, true); }
};

function linguaDa(tel, dichiarata){
  const t = String(tel||'').replace(/[^0-9+]/g,'');
  const mappa = [
    ['IT',['+39']],
    ['ES',['+34','+52','+54','+56','+57','+58','+51','+591','+593','+595','+598']],
    ['FR',['+33','+32','+352']],
    ['PT',['+351','+55']],
    ['DE',['+49','+43','+41']],
    ['ZH',['+86','+852','+853','+886']]
  ];
  for(const [l,pref] of mappa) if(pref.some(x=>t.startsWith(x))) return l;
  const d = String(dichiarata||'').toUpperCase();
  return ['IT','EN','ES','FR','DE','PT','ZH'].includes(d) ? d : 'EN';
}

const WA = {
  IT: (n,a,b,l)=>`Gentile ${n}, di seguito la ricevuta del suo soggiorno dal ${a} al ${b}: ${l}`,
  EN: (n,a,b,l)=>`Dear ${n}, here is the receipt for your stay from ${a} to ${b}: ${l}`,
  ES: (n,a,b,l)=>`Estimado/a ${n}, a continuación el recibo de su estancia del ${a} al ${b}: ${l}`,
  FR: (n,a,b,l)=>`Cher/Chère ${n}, voici le reçu de votre séjour du ${a} au ${b} : ${l}`,
  DE: (n,a,b,l)=>`Sehr geehrte/r ${n}, hier ist die Quittung für Ihren Aufenthalt vom ${a} bis ${b}: ${l}`,
  PT: (n,a,b,l)=>`Caro/a ${n}, segue o recibo da sua estadia de ${a} a ${b}: ${l}`,
  ZH: (n,a,b,l)=>`尊敬的 ${n}：以下是您 ${a} 至 ${b} 住宿的收据：${l}`
};

window.inviaWa = async (id, idtrx) => {
  const p = DATI.righe.find(x=>x.id===id);
  toast('Preparo il link…');
  try{
    const link = await linkRicevuta(id, idtrx);
    const lang = linguaDa(p.telefono, p.lingua);
    const testo = (WA[lang]||WA.EN)(p.nome, dataIt(p.checkin), dataIt(p.checkout), link);
    const num = (p.telefono||'').replace(/[^0-9]/g,'');
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(testo)}`, '_blank');
  }catch(e){ toast('Non riesco a creare il link: '+e.message, true); }
};

window.annulla = async (id, idtrx) => {
  if(!await dialogo('Annulla ricevuta',
    'Il documento verrà annullato presso l\u2019Agenzia delle Entrate. L\u2019operazione non è reversibile.',
    '', 'Annulla ricevuta')) return;
  try{
    await api('/annulla', {method:'POST', body: JSON.stringify({id, idtrx})});
    toast('Ricevuta annullata');
    carica();
  }catch(e){ toast('Annullo non riuscito: '+e.message, true); }
};

/* ---------- tabs ---------- */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  VIEW = t.dataset.view;
  $('#v-operativo').classList.toggle('hidden', VIEW!=='operativo');
  $('#v-storico').classList.toggle('hidden', VIEW!=='storico');
});


/* ---------- avvio ---------- */
(async function(){
  if(!TOKEN) chiediToken();
  applicaMese();
  renderCtx();
  carica();
})();
</script>
