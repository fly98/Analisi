<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12283f">
<title>InternoUno Cassa</title>
<link rel="manifest" href="fisco-manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="fisco-icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="fisco-icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="fisco-icon-180.png">
<meta name="apple-mobile-web-app-title" content="Cassa">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#eef1f5;
  --surface:#fff;
  --ink:#12283f;
  --muted:#657896;
  --line:#dde3ec;
  --ok:#0d6e5e;
  --ok-bg:#e3f3ef;
  --warn:#9a5b00;
  --warn-bg:#fdf0dc;
  --info:#2b4f8e;
  --info-bg:#e8eefb;
  --off:#6b7280;
  --off-bg:#eceef1;
  --danger:#b42318;
  --radius:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding-bottom:env(safe-area-inset-bottom);
}
header{
  background:var(--ink);color:#fff;padding:14px 16px calc(14px);
  padding-top:calc(14px + env(safe-area-inset-top));
  position:sticky;top:0;z-index:20;
}
.htop{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
h1{margin:0;font-size:17px;font-weight:650;letter-spacing:-.2px}
.sub{font-size:12px;color:#9db2cd}
.tabs{display:flex;gap:4px;margin-top:12px}
.tab{
  flex:1;padding:8px 4px 4px;border:0;border-radius:8px;font:inherit;font-size:12.5px;font-weight:600;
  background:rgba(255,255,255,.1);color:#c3d2e6;cursor:pointer;
}
.tab.on{background:#fff;color:var(--ink)}
main{padding:12px;max-width:1100px;margin:0 auto}

.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.seg{display:inline-flex;background:#e2e7ef;border-radius:9px;padding:2px}
.seg button{
  font:inherit;font-size:13px;font-weight:600;padding:6px 14px;border:0;border-radius:7px;
  background:transparent;color:var(--muted);cursor:pointer
}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(18,40,63,.12)}
.ctx{display:flex;align-items:center;gap:6px}
.ctx button{
  font:inherit;font-size:13.5px;font-weight:600;padding:7px 12px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);cursor:pointer
}
.ctx .nav{padding:7px 10px;font-size:15px;line-height:1}
.ctx .lbl{min-width:130px;text-align:center}
.ctx .info{font-size:13px;color:var(--muted)}

/* calendario a selezione intervallo */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head button{
  font:inherit;font-size:16px;padding:4px 12px;border:1px solid var(--line);border-radius:8px;
  background:#fff;cursor:pointer;line-height:1.2
}
.cal-head span{font-weight:650;font-size:14.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid .dow{
  font-size:10.5px;color:var(--muted);text-align:center;padding:4px 0;font-weight:650;
  text-transform:uppercase;letter-spacing:.3px
}
.cal-grid button{
  font:inherit;font-size:13px;aspect-ratio:1;border:0;border-radius:7px;background:#fff;
  color:var(--ink);cursor:pointer;padding:0
}
.cal-grid button.vuoto{background:transparent;cursor:default}
.cal-grid button.dentro{background:var(--info-bg);border-radius:0}
.cal-grid button.bordo{background:var(--ink);color:#fff;font-weight:650}
.cal-grid button.oggi{box-shadow:inset 0 0 0 1.5px var(--info)}
.cal-sel{font-size:12.5px;color:var(--muted);margin-top:10px;text-align:center}
.bar input[type=date]{
  font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)
}
button.act{
  font:inherit;font-weight:600;padding:8px 14px;border:0;border-radius:8px;
  background:var(--ink);color:#fff;cursor:pointer
}
button.act:disabled{opacity:.5}

.filtri{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.cerca{position:relative;flex:1 1 200px;min-width:170px}

/* su schermo stretto: tutto centrato e a piena larghezza */
@media(max-width:640px){
  .filtri{gap:8px}
  .cerca{flex:1 1 100%;min-width:0}
  /* due colonne esatte, allineate ai bordi come il campo di ricerca */
  .filtri select{
    flex:0 0 auto;
    width:calc(50% - 4px);
    max-width:none;min-width:0;
    text-overflow:ellipsis
  }

  .bar{flex-direction:column;align-items:center;gap:10px}
  .seg{width:100%;justify-content:center}
  .seg button{flex:1;padding:8px 6px;font-size:12.5px}
  .ctx{justify-content:center;width:100%}
  .ctx .info{text-align:center}
  .kpis{grid-template-columns:repeat(4,1fr);gap:6px}
  .kpi{padding:8px 6px;text-align:center}
  .kpi b{font-size:19px}
  .kpi span{font-size:9.5px;line-height:1.2;display:block}
  .conta{text-align:center}
}
.cerca input{
  width:100%;font:inherit;font-size:14.5px;padding:9px 32px 9px 12px;
  border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)
}
.filtri select{
  font:inherit;font-size:13.5px;font-weight:600;padding:9px 30px 9px 12px;
  border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);
  cursor:pointer;flex:0 1 auto;max-width:48%;
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath fill='%23657896' d='M0 0l5 6 5-6z'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 11px center
}
.filtri select.attivo{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.cerca button{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  border:0;background:transparent;color:var(--muted);font-size:17px;cursor:pointer;
  padding:2px 6px;line-height:1
}
.stati{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.stati button{
  flex:0 0 auto;font:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;
  border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);cursor:pointer;
  white-space:nowrap
}
.stati button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.stati button b{font-weight:700;margin-left:4px;opacity:.75}
.conta{font-size:12.5px;color:var(--muted);margin:-4px 0 10px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px}
.kpi b{display:block;font-size:21px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kpi span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi.warn b{color:var(--warn)} .kpi.ok b{color:var(--ok)}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;
}
.card.da_emettere{border-left:4px solid var(--warn)}
.card.emessa{border-left:4px solid var(--ok)}
.card.fattura{border-left:4px solid var(--info)}
.card.esclusa{border-left:4px solid var(--off);opacity:.72}
.card.futura{border-left:4px solid var(--line)}
.p-futura{background:var(--off-bg);color:var(--muted)}

.row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.nome{font-weight:650;font-size:15px}
.meta{font-size:12.5px;color:var(--muted);margin-top:2px}
.eur{font-variant-numeric:tabular-nums;font-weight:650;font-size:16px;white-space:nowrap}
.eur small{display:block;font-weight:400;font-size:11px;color:var(--muted);text-align:right}

.pill{
  display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:650;
  letter-spacing:.2px;vertical-align:middle
}
.p-emessa{background:var(--ok-bg);color:var(--ok)}
.p-da_emettere{background:var(--warn-bg);color:var(--warn)}
.p-fattura{background:var(--info-bg);color:var(--info)}
.p-esclusa{background:var(--off-bg);color:var(--off)}
.canale{font-size:11px;color:var(--muted)}
.camere{display:inline-flex;gap:3px;vertical-align:middle;margin-right:6px}
.cam{
  display:inline-flex;align-items:center;justify-content:center;
  width:21px;height:21px;border-radius:6px;font-size:11.5px;font-weight:700;color:#fff;
  letter-spacing:-.2px
}
.cam.num{background:#fff;color:#41503a;border:1.5px solid #5c6b52}

.actions{display:flex;gap:6px;margin-top:10px}
.actions button{
  flex:1 1 0;width:0;min-width:0;
  font:inherit;font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:8px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink);
  display:inline-flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap
}
.actions button svg{width:15px;height:15px;flex:0 0 auto}
.actions .ico{font-size:15px;line-height:1}
.actions button.primary{background:var(--ok);border-color:var(--ok);color:#fff}
.actions button.ghost{color:var(--muted)}
.actions button.danger{color:var(--danger);border-color:#f0c9c5}
.docinfo{
  margin-top:8px;font-size:12.5px;color:var(--muted);
  display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap
}
.docinfo code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink)}
.numdoc{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;font-weight:600;
  color:var(--info);background:none;border:0;padding:0;cursor:pointer;text-decoration:underline;
  text-underline-offset:2px
}
.numdoc:active{opacity:.6}

.prop{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.prop.alta{border-left:4px solid var(--ok)}
.prop.media{border-left:4px solid var(--warn)}
.prop.bassa{border-left:4px solid var(--off)}
.prop-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.prop select{
  width:100%;font:inherit;font-size:13px;padding:8px;margin-top:9px;
  border:1px solid var(--line);border-radius:8px;background:#fff
}
.prop .azioni{display:flex;gap:6px;margin-top:9px}
.prop .azioni button{
  font:inherit;font-size:13px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink)
}
.prop .azioni button.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.punti{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap}
.punti.alta{background:var(--ok-bg);color:var(--ok)}
.punti.media{background:var(--warn-bg);color:var(--warn)}
.punti.bassa{background:var(--off-bg);color:var(--off)}
.massa{
  background:var(--info-bg);border:1px solid #c9d8f5;border-radius:var(--radius);
  padding:12px;margin-bottom:12px;font-size:13.5px
}
.massa button{
  font:inherit;font-weight:600;font-size:13.5px;padding:8px 14px;border:0;border-radius:8px;
  background:var(--info);color:#fff;cursor:pointer;margin-top:8px
}
.tab-ric{width:100%;table-layout:fixed;font-size:12.5px}
.tab-ric th,.tab-ric td{padding:7px 4px}
.tab-ric th:nth-child(1),.tab-ric td:nth-child(1){width:20%}
.tab-ric th:nth-child(2),.tab-ric td:nth-child(2){width:38%}
.tab-ric th:nth-child(3),.tab-ric td:nth-child(3){width:16%;text-align:center}
.tab-ric th:nth-child(4),.tab-ric td:nth-child(4){width:20%;text-align:right;white-space:nowrap}
.tab-ric th:nth-child(5),.tab-ric td:nth-child(5){width:6%;text-align:center}
.tab-ric .numdoc{font-size:11.5px;white-space:nowrap}
.tab-ric .pill{font-size:10px;padding:2px 6px}
.tab-ric .ann button{
  font:inherit;font-size:14px;font-weight:700;line-height:1;color:var(--danger);
  background:none;border:0;padding:4px 2px;cursor:pointer
}
.empty{text-align:center;padding:38px 16px;color:var(--muted)}
.loading{text-align:center;padding:30px;color:var(--muted)}
.hidden{display:none}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);font-size:13.5px}
th{background:#f7f9fc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
td.num{text-align:right;font-variant-numeric:tabular-nums}

dialog{
  border:0;border-radius:14px;padding:0;max-width:400px;width:92%;
  box-shadow:0 18px 50px rgba(10,25,45,.28)
}
dialog::backdrop{background:rgba(10,25,45,.45)}
.dlg{padding:18px}
.dlg h3{margin:0 0 4px;font-size:16px}
.dlg p{margin:0 0 14px;font-size:13.5px;color:var(--muted)}
.dlg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px}
.dlg .sezione{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
  font-weight:700;margin:14px 0 6px;padding-top:10px;border-top:1px solid var(--line)}
.dlg .riga2{display:flex;gap:8px}
.dlg .riga2>*{flex:1;min-width:0}
.dlg .rigaf{border:1px solid var(--line);border-radius:9px;padding:9px;margin-bottom:7px;background:#fbfcfe}
.dlg .rigaf .top{display:flex;gap:8px;align-items:center}
.dlg .rigaf .top input:first-child{flex:1}
.dlg .rigaf .top input[type=number]{width:88px;flex:0 0 auto}
.dlg .rigaf select{width:120px;flex:0 0 auto}
.dlg .tot-f{background:var(--ok-bg);border-radius:9px;padding:10px;margin-top:10px;
  font-weight:700;display:flex;justify-content:space-between}
.dlg #fc-risultati{max-height:190px;overflow:auto;margin-top:6px}
.dlg .ris{
  padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;
  cursor:pointer;font-size:13px;background:#fff
}
.dlg .ris:active{background:var(--ok-bg)}
.dlg .ris b{font-weight:650}
.dlg .ris span{color:var(--muted);font-size:11.5px;display:block;margin-top:2px}
.dlg .cerca-cli{display:flex;gap:6px;align-items:center}
.dlg .cerca-cli input{flex:1}
.dlg .cerca-cli button{
  font:inherit;font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;
  border:1px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap
}
.dlg .esito{font-size:12px;margin-top:5px}
.dlg .esito.ok{color:var(--ok)} .dlg .esito.ko{color:var(--danger)}
.dlg input,.dlg select,.dlg textarea{
  width:100%;font:inherit;padding:9px;border:1px solid var(--line);border-radius:8px;background:#fff;
  resize:vertical
}
.dlg .btns{display:flex;gap:8px;margin-top:16px}
.dlg .btns button{flex:1;font:inherit;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:#fff}
.dlg .btns button.primary{background:var(--ok);color:#fff;border-color:var(--ok)}

#toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:99;
  background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s
}
#toast.show{opacity:1}
#toast.err{background:var(--danger)}

@media(min-width:760px){
  .row1{align-items:center}
  .card{padding:14px 16px}
}
</style>
</head>
<body>

<header>
  <div class="htop">
    <h1>InternoUno Cassa</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="sub" id="periodo"></span>
      <button id="clienti" title="Anagrafica clienti"
        style="border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#c3d2e6;
               font:inherit;font-size:15px;line-height:1;padding:5px 9px;border-radius:8px;cursor:pointer">&#128100;</button>
      <button id="pwd" title="Rinnova password Fisconline"
        style="border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#c3d2e6;
               font:inherit;font-size:15px;line-height:1;padding:5px 9px;border-radius:8px;cursor:pointer">&#128273;</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-view="operativo">Prenotazioni</button>
    <button class="tab" data-view="ricevute">Ricevute</button>
    <button class="tab" data-view="storico">Match storico</button>
  </div>
</header>

<main>
  <div class="bar">
    <div class="seg" id="seg">
      <button data-mode="recenti" class="on">Ultimi 30gg</button>
      <button data-mode="mese">Mese</button>
      <button data-mode="range">Periodo</button>
      <button data-mode="tutto">Tutto</button>
    </div>
    <div class="ctx" id="ctx"></div>
  </div>
  <input type="hidden" id="dal"><input type="hidden" id="al">

  <!-- VISTA OPERATIVA -->
  <section id="v-operativo">
    <div class="kpis" id="kpis"></div>
    <div class="filtri">
      <div class="cerca">
        <input type="search" id="q" placeholder="Cerca nome, camera, data…" autocomplete="off">
        <button type="button" id="q-x" title="Pulisci">×</button>
      </div>
      <select id="sel-stato"></select>
      <select id="sel-canale"></select>
    </div>
    <div class="conta" id="conta"></div>
    <div id="lista"><div class="loading">Caricamento…</div></div>
  </section>

  <!-- VISTA RICEVUTE -->
  <section id="v-ricevute" class="hidden">
    <div class="kpis" id="kpis-ric"></div>
    <div class="seg" id="tipo-doc" style="margin-bottom:12px">
      <button data-t="ricevute" class="on">Ricevute</button>
      <button data-t="fatture">Fatture</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;justify-content:center">
      <button class="act" id="ric-nuova">Nuova ricevuta</button>
      <button class="act" id="ric-csv" style="background:#fff;color:var(--ink);border:1px solid var(--line)">Esporta</button>
      <button class="act" id="ric-ricarica" style="background:#fff;color:var(--ink);border:1px solid var(--line)">Aggiorna</button>
    </div>
    <div id="lista-ric"><div class="loading">Caricamento…</div></div>
  </section>

  <!-- VISTA STORICO -->
  <section id="v-storico" class="hidden">
    <div class="kpis" id="kpis-st"></div>
    <div class="seg" id="verso" style="margin-bottom:12px">
      <button data-v="ricevute" class="on">Dalle ricevute</button>
      <button data-v="prenotazioni">Dalle prenotazioni</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <div class="seg" id="ordina">
        <button data-o="importo" class="on">Importo</button>
        <button data-o="punti">Affidabilità</button>
        <button data-o="data">Data</button>
      </div>
      <button class="act" id="ricalcola" style="padding:7px 12px;font-size:13px">Ricalcola</button>
    </div>
    <div id="massa"></div>
    <div id="proposte"><div class="loading">Caricamento proposte…</div></div>
    <h3 style="font-size:14px;margin:20px 0 8px">Ricevute senza prenotazione</h3>
    <div id="orfane"></div>
  </section>
</main>

<dialog id="cal">
  <div class="dlg">
    <h3>Scegli il periodo</h3>
    <p>Tocca il primo giorno, poi l’ultimo.</p>
    <div class="cal-head">
      <button type="button" id="cal-prev">‹</button>
      <span id="cal-mese"></span>
      <button type="button" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-sel" id="cal-sel"></div>
    <div class="btns">
      <button type="button" id="cal-no">Annulla</button>
      <button type="button" class="primary" id="cal-ok">Applica</button>
    </div>
  </div>
</dialog>

<dialog id="dlg">
  <form method="dialog" class="dlg">
    <h3 id="dlg-t"></h3>
    <p id="dlg-p"></p>
    <div id="dlg-body"></div>
    <div class="btns">
      <button value="no">Annulla</button>
      <button value="si" class="primary" id="dlg-ok">Conferma</button>
    </div>
  </form>
</dialog>

<div id="toast"></div>

<script>
const API = 'https://fisco-worker.f-castiglioni.workers.dev';
let TOKEN = localStorage.getItem('fisco_token') || '';
let DATI = null, VIEW = 'operativo';

const $ = s => document.querySelector(s);
const eur = n => (n ?? 0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const gg = iso => iso ? iso.slice(8,10)+'/'+iso.slice(5,7) : '';

function toast(msg, err){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' err' : '');
  setTimeout(()=>t.className='', 3200);
}

async function api(path, opt={}){
  const sep = path.includes('?') ? '&' : '?';
  path = path + sep + '_=' + Date.now();
  const r = await fetch(API + path, {
    cache: 'no-store',
    ...opt,
    headers:{'X-Token':TOKEN,'Content-Type':'application/json',...(opt.headers||{})}
  });
  if(r.status === 401){
    localStorage.removeItem('fisco_token');
    TOKEN = '';
    const e = new Error('Token non valido');
    e.auth = true;
    throw e;
  }
  const d = await r.json();
  if(!r.ok || d.ok === false) throw new Error(d.error || ('HTTP '+r.status));
  return d;
}

window.chiediToken = function(){
  const t = prompt('Token di accesso');
  if(t){ TOKEN = t.trim(); localStorage.setItem('fisco_token', TOKEN); return true; }
  return false;
}

/* ---------- selettore periodo ---------- */
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
let MODE = 'recenti';
let meseSel = new Date().getMonth();
let annoSel = new Date().getFullYear();

const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const oggiIso = () => iso(new Date());

function applicaMese(){
  const primo = new Date(annoSel, meseSel, 1);
  const ultimo = new Date(annoSel, meseSel+1, 0);
  $('#dal').value = iso(primo);
  $('#al').value = iso(ultimo);
}

// partenze degli ultimi 30 giorni
function applicaRecenti(){
  const oggi = new Date();
  const trenta = new Date(oggi); trenta.setDate(trenta.getDate()-30);
  $('#dal').value = iso(trenta);
  $('#al').value = iso(oggi);
}

function applicaTutto(){
  $('#dal').value = new Date().getFullYear() + '-01-01';
  $('#al').value = oggiIso();
}

function renderCtx(){
  const c = $('#ctx');
  if(MODE === 'recenti'){
    c.innerHTML = `<span class="info">Partenze dal ${gg($('#dal').value)} a oggi</span>`;
    return;
  }
  if(MODE === 'mese'){
    c.innerHTML = `<button class="nav" id="m-prev">‹</button>
      <button class="lbl" id="m-lbl">${MESI[meseSel]} ${annoSel}</button>
      <button class="nav" id="m-next">›</button>`;
    $('#m-prev').onclick = ()=>{ if(--meseSel<0){meseSel=11;annoSel--;} applicaMese(); renderCtx(); ricaricaVista(); };
    $('#m-next').onclick = ()=>{ if(++meseSel>11){meseSel=0;annoSel++;} applicaMese(); renderCtx(); ricaricaVista(); };
    $('#m-lbl').onclick = ()=>{ const o=new Date(); meseSel=o.getMonth(); annoSel=o.getFullYear(); applicaMese(); renderCtx(); ricaricaVista(); };
  } else if(MODE === 'range'){
    c.innerHTML = `<button id="r-apri">${gg($('#dal').value)} → ${gg($('#al').value)}</button>`;
    $('#r-apri').onclick = apriCalendario;
  } else {
    c.innerHTML = `<span class="info">Dal 1 gennaio a oggi</span>`;
  }
}

document.querySelectorAll('#seg button').forEach(b => b.onclick = ()=>{
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  MODE = b.dataset.mode;
  if(MODE === 'recenti'){ applicaRecenti(); renderCtx(); ricaricaVista(); }
  else if(MODE === 'mese'){ applicaMese(); renderCtx(); ricaricaVista(); }
  else if(MODE === 'tutto'){ applicaTutto(); renderCtx(); ricaricaVista(); }
  else { renderCtx(); apriCalendario(); }
});

/* ---------- calendario a intervallo ---------- */
let calMese, calAnno, calDa = null, calA = null;

function apriCalendario(){
  const base = $('#dal').value ? new Date($('#dal').value+'T12:00:00') : new Date();
  calMese = base.getMonth(); calAnno = base.getFullYear();
  calDa = $('#dal').value || null;
  calA  = $('#al').value || null;
  disegnaCal();
  $('#cal').showModal();
}

function disegnaCal(){
  $('#cal-mese').textContent = `${MESI[calMese]} ${calAnno}`;
  const primo = new Date(calAnno, calMese, 1);
  const giorni = new Date(calAnno, calMese+1, 0).getDate();
  const offset = (primo.getDay() + 6) % 7; // lunedi = 0

  let html = ['L','M','M','G','V','S','D'].map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++) html += '<button class="vuoto" disabled></button>';

  for(let g=1; g<=giorni; g++){
    const d = iso(new Date(calAnno, calMese, g));
    let cls = '';
    if(calDa && calA && d > calDa && d < calA) cls = 'dentro';
    if(d === calDa || d === calA) cls = 'bordo';
    if(d === oggiIso()) cls += ' oggi';
    html += `<button class="${cls}" data-d="${d}">${g}</button>`;
  }
  $('#cal-grid').innerHTML = html;

  $('#cal-grid').querySelectorAll('button[data-d]').forEach(b => b.onclick = ()=>{
    const d = b.dataset.d;
    if(!calDa || (calDa && calA)){ calDa = d; calA = null; }
    else if(d < calDa){ calA = calDa; calDa = d; }
    else { calA = d; }
    disegnaCal();
  });

  $('#cal-sel').textContent = calDa
    ? (calA ? `Dal ${gg(calDa)} al ${gg(calA)}` : `Inizio ${gg(calDa)} — scegli l\u2019ultimo giorno`)
    : 'Nessun giorno selezionato';
}

$('#cal-prev').onclick = ()=>{ if(--calMese<0){calMese=11;calAnno--;} disegnaCal(); };
$('#cal-next').onclick = ()=>{ if(++calMese>11){calMese=0;calAnno++;} disegnaCal(); };
$('#cal-no').onclick  = ()=> $('#cal').close();
$('#cal-ok').onclick  = ()=>{
  if(!calDa) return;
  $('#dal').value = calDa;
  $('#al').value  = calA || calDa;
  $('#cal').close();
  renderCtx();
  ricaricaVista();
};

// ricarica la scheda attualmente aperta: cambiando periodo
// non ha senso dover premere Aggiorna
function ricaricaVista(){
  DATI = null; RIC = null; FATT = null; ORF = null; PROP = null;
  if(VIEW === 'ricevute') { TIPODOC==='fatture' ? caricaFatture() : caricaRicevute(); }
  else if(VIEW === 'storico') caricaOrfane();
  else carica();
}

/* ---------- caricamento ---------- */
async function carica(){
  const dal = $('#dal').value, al = $('#al').value;
  $('#periodo').textContent = 'partenze '+gg(dal)+' – '+gg(al)+' · v60';
  $('#lista').innerHTML = '<div class="loading">Caricamento…</div>';
  try{
    DATI = await api(`/elenco?dal=${dal}&al=${al}`);
    render();
  }catch(e){
    if(e.auth){
      $('#lista').innerHTML = `<div class="empty">Serve il token di accesso.<br>
        <button class="act" style="margin-top:12px" onclick="if(chiediToken())carica()">Inserisci token</button></div>`;
      return;
    }
    $('#lista').innerHTML = `<div class="empty">Non riesco a caricare i dati.<br><small>${e.message}</small></div>`;
  }
}

/* ---------- render ---------- */
let FILTRO = 'tutte', QUERY = '', CANALE = 'tutti';

const STATI = [
  ['tutte','Tutte'], ['da_emettere','Da emettere'], ['emessa','Emesse'],
  ['fattura','Fattura'], ['esclusa','Escluse'], ['futura','Non arrivati']
];

function righeFiltrate(){
  if(!DATI) return [];
  const q = QUERY.trim().toLowerCase();
  return DATI.righe.filter(p => {
    if(FILTRO !== 'tutte' && p.stato !== FILTRO) return false;
    if(CANALE !== 'tutti' && (p.canale || '—') !== CANALE) return false;
    if(!q) return true;
    const campi = [
      p.nome, p.canale, (p.camere||[]).join(' '),
      p.checkin, p.checkout, gg(p.checkin), gg(p.checkout),
      dataIt(p.checkin), dataIt(p.checkout),
      String(p.atteso.toFixed(2)).replace('.', ','),
      p.ricevuta ? p.ricevuta.numero : ''
    ].join(' ').toLowerCase();
    return q.split(/\s+/).every(t => campi.includes(t));
  });
}

function render(){
  if(!DATI) return;
  const r = DATI.riepilogo;
  $('#kpis').innerHTML = `
    <div class="kpi warn"><b>${r.daEmettere}</b><span>Da emettere</span></div>
    <div class="kpi ok"><b>${r.emesse}</b><span>Emesse</span></div>
    <div class="kpi"><b>${r.fattura}</b><span>Fattura</span></div>
    <div class="kpi"><b>${r.escluse}</b><span>Escluse</span></div>`;

  // tendina degli stati
  const per = {};
  for(const p of DATI.righe) per[p.stato] = (per[p.stato]||0)+1;
  const selS = $('#sel-stato');
  selS.innerHTML = STATI
    .filter(([k]) => k==='tutte' || per[k])
    .map(([k,l]) => {
      const n = k==='tutte' ? DATI.righe.length : per[k];
      const et = k==='tutte' ? 'Tutti gli stati' : l;
      return `<option value="${k}" ${FILTRO===k?'selected':''}>${et} (${n})</option>`;
    }).join('');
  selS.classList.toggle('attivo', FILTRO!=='tutte');
  selS.onchange = ()=>{ FILTRO = selS.value; CANALE='tutti'; render(); };

  // tendina dei canali, calcolata sullo stato selezionato
  const baseCan = FILTRO==='tutte' ? DATI.righe : DATI.righe.filter(p=>p.stato===FILTRO);
  const canali = {};
  for(const p of baseCan) { const c = p.canale || '—'; canali[c] = (canali[c]||0)+1; }
  const ordinati = Object.entries(canali).sort((a,b)=>b[1]-a[1]);
  if(!canali[CANALE]) CANALE = 'tutti';
  const selC = $('#sel-canale');
  selC.innerHTML = `<option value="tutti">Tutti i canali (${baseCan.length})</option>` +
    ordinati.map(([c,n])=>`<option value="${c}" ${CANALE===c?'selected':''}>${c} (${n})</option>`).join('');
  selC.classList.toggle('attivo', CANALE!=='tutti');
  selC.onchange = ()=>{ CANALE = selC.value; render(); };

  const righe = righeFiltrate();
  const attivo = FILTRO!=='tutte' || QUERY.trim() || CANALE!=='tutti';
  $('#conta').textContent = attivo
    ? `${righe.length} di ${DATI.righe.length} prenotazioni`
    : '';

  $('#lista').innerHTML = righe.length
    ? righe.map(riga).join('')
    : `<div class="empty">${attivo ? 'Nessun risultato con questi filtri.' : 'Nessuna prenotazione nel periodo.'}</div>`;


}

const SVG_WA = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.1-.2.3-.7 1-.9 1.2-.2.2-.3.2-.6.1-1.6-.8-2.7-1.4-3.8-3.2-.3-.5.3-.5.8-1.5.1-.2 0-.4 0-.5s-.7-1.6-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.1 3.2 5 4.5 1.8.8 2.5.9 3.4.7.5-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 4.9L2 22l5.2-1.3c1.4.8 3 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3.1.8.8-3-.2-.3c-.9-1.4-1.3-3-1.3-4.6 0-4.6 3.8-8.4 8.4-8.4s8.4 3.8 8.4 8.4-3.8 8.5-8.3 8.5z"/></svg>';

const CAMERE = {
  'Gialla':{l:'G',c:'#e0a92e'}, 'Marrone':{l:'M',c:'#7a5230'}, 'Rossa':{l:'R',c:'#b03a2e'},
  'Verde':{l:'V',c:'#5c6b52'},  'Azzurra':{l:'A',c:'#5b8fb0'},
  'Uno':{l:'1'}, 'Due':{l:'2'}, 'Tre':{l:'3'}, 'Quattro':{l:'4'}, 'Cinque':{l:'5'}
};
const dataIt = iso => iso ? iso.slice(8,10)+'/'+iso.slice(5,7)+'/'+iso.slice(2,4) : '';
function descrizioneStandard(p){
  const n = (p.nome||'').trim();
  return `Soggiorno dal ${dataIt(p.checkin)} al ${dataIt(p.checkout)}` + (n ? ` del Sig./Sig.ra ${n}` : '');
}

function badgeCamere(lista){
  if(!lista || !lista.length) return '';
  return '<span class="camere">' + lista.map(n=>{
    const c = CAMERE[n];
    if(!c) return `<span class="cam num" title="${n}">?</span>`;
    return c.c
      ? `<span class="cam" style="background:${c.c}" title="${n}">${c.l}</span>`
      : `<span class="cam num" title="${n}">${c.l}</span>`;
  }).join('') + '</span>';
}

const ETICHETTA = {emessa:'Emessa', da_emettere:'Da emettere', fattura:'Fattura', esclusa:'Esclusa', futura:'Non arrivato'};

function riga(p){
  const doc = p.ricevuta;
  let azioni = '';
  if(p.stato === 'da_emettere'){
    azioni = `<div class="actions">
      <button class="primary" onclick="apriEmissione('${p.id}')">Emetti ricevuta</button>
      <button onclick="apriFattura('${p.id}')">Fattura</button>
      <button class="ghost" onclick="segna('${p.id}','esclusa')">Non emettere</button>
    </div>`;
  } else if(p.stato === 'emessa'){
    const idt = doc && doc.id ? doc.id : '';
    azioni = `<div class="docinfo">
      <span>${doc ? 'Ricevuta <code>'+(doc.numero||'—')+'</code>' : ''}
        ${p.origine && p.origine.startsWith('match') ? '· abbinata automaticamente' : ''}</span>
    </div>
    ${idt ? `<div class="actions">
      <button onclick="vediPdf('${idt}')" title="Apri il documento">PDF</button>
      ${p.email ? `<button onclick="inviaMail('${p.id}','${idt}')" title="Invia per email">@ ${linguaDa(p.telefono,p.lingua)}</button>` : ''}
      ${p.telefono ? `<button onclick="inviaWa('${p.id}','${idt}')" title="Invia su WhatsApp" style="color:#1f8f4e">${SVG_WA}</button>` : ''}
      <button onclick="riemetti('${p.id}','${idt}')" title="Annulla e riemetti"><span class="ico">↻</span></button>
      <button class="danger" onclick="annulla('${p.id}','${idt}')" title="Annulla la ricevuta">Annulla</button>
    </div>` : ''}`;
  } else if(p.stato === 'futura'){
    azioni = `<div class="docinfo"><span>Arrivo previsto il ${gg(p.checkin)}</span></div>
    <div class="actions">
      <button onclick="apriEmissione('${p.id}')">Emetti in anticipo</button>
      <button onclick="apriFattura('${p.id}')">Fattura</button>
      <button class="ghost" onclick="segna('${p.id}','esclusa')">Non emettere</button>
    </div>`;
  } else if(p.stato === 'fattura'){
    // se la fattura è stata emessa da qui, la nota contiene il numero della serie FE
    const num = ((p.nota || '').match(/FE\s*[\d]+\/[\d]+/) || [''])[0];
    azioni = num
      ? `<div class="docinfo"><span>Fattura <b>${num}</b></span></div>
         <div class="actions">
           <button onclick="vediFattura('${num}')" title="Apri la copia">Copia</button>
           <button onclick="inviaCopia('${num}')" title="Invia al cliente">@</button>
           <button class="ghost" onclick="segna('${p.id}',null)">Riapri</button>
         </div>`
      : `<div class="docinfo">
           <span>Segnata come fatturata</span>
           <button class="ghost" style="font:inherit;font-size:12.5px;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer"
             onclick="segna('${p.id}',null)">Riapri</button>
         </div>`;
  } else {
    azioni = `<div class="docinfo">
      <span>Nessuna ricevuta da emettere</span>
      <button class="ghost" style="font:inherit;font-size:12.5px;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer"
        onclick="segna('${p.id}',null)">Riapri</button>
    </div>`;
  }

  return `<div class="card ${p.stato}">
    <div class="row1">
      <div>
        <div class="nome">${badgeCamere(p.camere)}${p.nome || 'Ospite senza nome'} <span class="pill p-${p.stato}">${ETICHETTA[p.stato]}</span></div>
        <div class="meta">${gg(p.checkin)} → ${gg(p.checkout)} · ${p.notti} ${p.notti==1?'notte':'notti'} · ${p.adulti} ad.${p.bambini?' + '+p.bambini+' b.':''}
          <span class="canale">· ${p.canale||'—'}</span></div>
      </div>
      <div class="eur">${eur(p.atteso)}<small>tot ${eur(p.totale)} − tassa ${eur(p.cityTax)}</small></div>
    </div>
    ${azioni}
  </div>`;
}

/* ---------- azioni ---------- */
function dialogo(titolo, testo, corpo, okLabel){
  $('#dlg-t').textContent = titolo;
  $('#dlg-p').textContent = testo;
  $('#dlg-body').innerHTML = corpo || '';
  $('#dlg-ok').textContent = okLabel || 'Conferma';
  const d = $('#dlg');
  d.showModal();

  // ricerca libera fra le prenotazioni scoperte
  const q = document.getElementById('cp-q');
  if(q){
    const disegna = ()=>{
      const t = q.value.trim().toLowerCase();
      const lista = ((ORF && ORF.scoperte) || []).filter(p=>{
        if(!t) return false;
        const campi = [p.nome, p.canale, (p.camere||[]).join(' '), p.checkin, p.checkout,
                       gg(p.checkin), gg(p.checkout), String(p.atteso.toFixed(2)).replace('.',',')
                      ].join(' ').toLowerCase();
        return t.split(/\s+/).every(x=>campi.includes(x));
      }).slice(0,30);
      document.getElementById('cp-lista').innerHTML = lista.length ? lista.map(p=>`
        <div onclick="scegliPren('${p.id}')" id="cp-${p.id}"
             style="padding:8px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13px">
          <b>${p.nome || 'senza nome'}</b> · ${eur(p.atteso)}<br>
          <span style="color:var(--muted)">${gg(p.checkin)} → ${gg(p.checkout)} · ${(p.camere||[]).join('+')} · ${p.canale}</span>
        </div>`).join('')
        : `<div style="color:var(--muted);font-size:13px;padding:6px">${t?'Nessun risultato':'Scrivi per cercare'}</div>`;
    };
    q.oninput = disegna; disegna();
  }

  // il dialogo dà il fuoco al primo campo: su iPad aprirebbe la tastiera
  const att = document.activeElement;
  if(att && /INPUT|TEXTAREA|SELECT/.test(att.tagName)) att.blur();

  // modulo fattura: precompilo cliente e righe
  const campoCerca = document.getElementById('fc-cerca');
  if(campoCerca){
    campoCerca.oninput = ()=>{
      const t = campoCerca.value.trim().toLowerCase();
      const box = document.getElementById('fc-risultati');
      if(t.length < 2){ box.innerHTML = ''; return; }
      const trovati = Object.entries(CLIENTI||{}).filter(([piva,c])=>{
        const campi = [c.denominazione, c.nome, c.cognome, piva, c.comune].join(' ').toLowerCase();
        return t.split(/\s+/).every(x => campi.includes(x));
      }).slice(0,8);
      box.innerHTML = trovati.length ? trovati.map(([piva,c])=>`
        <div class="ris" onclick="scegliCliente('${piva}')">
          <b>${(c.denominazione || ((c.cognome||'')+' '+(c.nome||''))).slice(0,42)}</b>
          <span>P.IVA ${piva}${c.comune ? ' · '+c.comune : ''}${c.codiceDestinatario ? ' · '+c.codiceDestinatario : ''}</span>
        </div>`).join('')
        : '<div style="font-size:12.5px;color:var(--muted);padding:6px">Nessun cliente in archivio: compila i campi sotto o cerca per partita IVA</div>';
    };
  }

  const selCli = document.getElementById('fc-sel');
  if(selCli){
    selCli.onchange = ()=>{
      const c = (CLIENTI||{})[selCli.value];
      if(!c){ ['fc-piva','fc-den','fc-ind','fc-cap','fc-com','fc-pro','fc-sdi','fc-pec'].forEach(i=>{const e=document.getElementById(i); if(e) e.value='';}); return; }
      document.getElementById('fc-piva').value = c.piva || c.cf || '';
      document.getElementById('fc-den').value  = c.denominazione || ((c.cognome||'')+' '+(c.nome||'')).trim();
      document.getElementById('fc-ind').value  = (c.indirizzo||'') + (c.civico ? ' '+c.civico : '');
      document.getElementById('fc-cap').value  = c.cap || '';
      document.getElementById('fc-com').value  = c.comune || '';
      document.getElementById('fc-pro').value  = c.provincia || '';
      document.getElementById('fc-sdi').value  = c.codiceDestinatario || '';
      document.getElementById('fc-pec').value  = c.pec || '';
      document.getElementById('fc-esito').textContent = '';
    };
    // righe iniziali dalla prenotazione
    if(window.__pren){
      const p = window.__pren;
      window.aggiungiRiga(`Soggiorno dal ${dataIt(p.checkin)} al ${dataIt(p.checkout)}` + (p.nome ? ` del Sig./Sig.ra ${p.nome}` : ''), p.atteso, '10', 1);
      if(p.cityTax > 0) window.aggiungiRiga('Imposta di soggiorno', p.cityTax, 'N1', 1);
    }
  }

  // se la finestra contiene il riepilogo importi, lo tengo aggiornato
  const imp = document.getElementById('f-imp');
  if(imp && document.getElementById('f-tot')){
    imp.oninput = window.aggiornaTot;
    window.aggiornaTot();
  }
  return new Promise(res => d.addEventListener('close', ()=>res(d.returnValue==='si'), {once:true}));
}

function leggiRighe(){
  return [...document.querySelectorAll('#fc-righe .rigaf')].map(el=>({
    descrizione: el.querySelector('.r-desc').value.trim(),

function linguaDa(tel, dichiarata){
  const t = String(tel||'').replace(/[^0-9+]/g,'');
  const mappa = [
    ['IT',['+39']],
    ['ES',['+34','+52','+54','+56','+57','+58','+51','+591','+593','+595','+598']],
    ['FR',['+33','+32','+352']],
    ['PT',['+351','+55']],
    ['DE',['+49','+43','+41']],
    ['ZH',['+86','+852','+853','+886']]
  ];
  for(const [l,pref] of mappa) if(pref.some(x=>t.startsWith(x))) return l;
  const d = String(dichiarata||'').toUpperCase();
  return ['IT','EN','ES','FR','DE','PT','ZH'].includes(d) ? d : 'EN';
}

const WA = {
  IT: (n,a,b,l)=>`Gentile ${n}, di seguito la ricevuta del suo soggiorno dal ${a} al ${b}: ${l}`,
  EN: (n,a,b,l)=>`Dear ${n}, here is the receipt for your stay from ${a} to ${b}: ${l}`,
  ES: (n,a,b,l)=>`Estimado/a ${n}, a continuación el recibo de su estancia del ${a} al ${b}: ${l}`,
  FR: (n,a,b,l)=>`Cher/Chère ${n}, voici le reçu de votre séjour du ${a} au ${b} : ${l}`,
  DE: (n,a,b,l)=>`Sehr geehrte/r ${n}, hier ist die Quittung für Ihren Aufenthalt vom ${a} bis ${b}: ${l}`,
  PT: (n,a,b,l)=>`Caro/a ${n}, segue o recibo da sua estadia de ${a} a ${b}: ${l}`,
  ZH: (n,a,b,l)=>`尊敬的 ${n}：以下是您 ${a} 至 ${b} 住宿的收据：${l}`
};

let PROP = null, ORF = null, VERSO = 'ricevute', ORDINE = 'importo';

document.querySelectorAll('#ordina button').forEach(b => b.onclick = ()=>{
  document.querySelectorAll('#ordina button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  ORDINE = b.dataset.o;
  if(VERSO==='ricevute' && ORF) renderOrfane();
});

function ordinaOrfane(lista){
  const l = [...lista];
  if(ORDINE==='importo') l.sort((a,b)=> b.ricevuta.importo - a.ricevuta.importo);
  else if(ORDINE==='punti') l.sort((a,b)=> b.migliore - a.migliore);
  else l.sort((a,b)=> a.ricevuta.giorno < b.ricevuta.giorno ? 1 : -1);
  return l;
}

document.querySelectorAll('#verso button').forEach(b => b.onclick = ()=>{

  $('#ordina').style.display = VERSO==='ricevute' ? '' : 'none';
  if(VERSO==='ricevute'){ ORF ? renderOrfane() : caricaOrfane(); }
  else { PROP ? renderProposte() : caricaProposte(); }
});

  }
}

function renderOrfane(){
  if(!ORF) return;
  const r = ORF.riepilogo;
  $('#kpis-st').innerHTML = `
    <div class="kpi warn"><b>${r.orfane}</b><span>Ricevute orfane</span></div>
    <div class="kpi ok"><b>${r.conCandidati}</b><span>Con candidati</span></div>
    <div class="kpi"><b>${r.senzaCandidati}</b><span>Senza</span></div>
    <div class="kpi"><b>${eur(r.totaleOrfane)}</b><span>Valore</span></div>`;
  $('#massa').innerHTML = '';
  $('#proposte').innerHTML = ORF.orfane.length
    ? ordinaOrfane(ORF.orfane).map(cardOrfana).join('')
    : '<div class="empty">Nessuna ricevuta orfana.</div>';
}

function cardOrfana(o){
  const r = o.ricevuta;
  const f = fascia(o.migliore);
  if(!o.candidati.length){
    return `<div class="prop bassa" id="or-${r.idtrx}">
      <div class="prop-top">
        <div>
          <button class="numdoc" onclick="vediPdf('${r.idtrx}')">${r.numero}</button>
          <div class="meta">emessa il ${r.data}</div>
        </div>
        <div class="eur">${eur(r.importo)}</div>
      </div>
      <div class="meta" style="margin-top:8px">Nessuna prenotazione con importo compatibile.</div>
      <div class="azioni">
        <button onclick="cercaPrenotazione('${r.idtrx}')">Cerca prenotazione</button>
        <button onclick="saltaOrfana('${r.idtrx}')">Ignora</button>
      </div>
    </div>`;
  }
  const opts = o.candidati.map((c,i)=>{
    const segno = c.deltaImporto>=0 ? '+' : '';
    const nome = (c.nome || 'senza nome').slice(0,22);
    return `<option value="${i}">${nome} · ${gg(c.checkin)}→${gg(c.checkout)} · ${eur(c.atteso)} · ${segno}${c.deltaImporto.toFixed(2)} € · ${c.deltaGiorni>=0?'+':''}${c.deltaGiorni}gg${c.indizio?' · '+c.indizio:''}</option>`;
  }).join('');
  return `<div class="prop ${f}" id="or-${r.idtrx}">
    <div class="prop-top">
      <div>
        <button class="numdoc" onclick="vediPdf('${r.idtrx}')">${r.numero}</button>
        <div class="meta">emessa il ${r.data} · tocca il numero per aprire il documento</div>
      </div>
      <div style="text-align:right">
        <div class="eur">${eur(r.importo)}</div>
        <span class="punti ${f}">${o.migliore}</span>
      </div>
    </div>
    <select id="so-${r.idtrx}">${opts}</select>
    <div class="azioni">
      <button class="ok" onclick="abbinaDaRicevuta('${r.idtrx}')">Abbina</button>
      <button onclick="cercaPrenotazione('${r.idtrx}')">Cerca altra</button>
      <button onclick="saltaOrfana('${r.idtrx}')">Nessuna</button>
      <button class="danger" onclick="annullaOrfana('${r.idtrx}','${r.numero}')">Annulla</button>
    </div>
  </div>`;
}

window.abbinaDaRicevuta = async (idtrx) => {
  const o = ORF.orfane.find(x=>x.ricevuta.idtrx===idtrx);
  const c = o.candidati[parseInt($('#so-'+idtrx).value,10)];
  try{
    await api('/stato', {method:'POST', body: JSON.stringify({
      id: c.id, stato:'emessa', idtrx, numero:o.ricevuta.numero,
      data:o.ricevuta.giorno, importo:o.ricevuta.importo,
      nota:`abbinata dalla ricevuta (${c.deltaImporto>=0?'+':''}${c.deltaImporto.toFixed(2)} €)` })});
    const el = document.getElementById('or-'+idtrx);
    if(el) el.remove();
    ORF.orfane = ORF.orfane.filter(x=>x.ricevuta.idtrx!==idtrx);
    // la prenotazione scelta non è più disponibile per le altre ricevute
    for(const x of ORF.orfane) x.candidati = x.candidati.filter(k=>k.id!==c.id);
    toast(`${o.ricevuta.numero} → ${c.nome || 'senza nome'}`);
    DATI = null; PROP = null;
  }catch(e){ toast('Non riesco a salvare: '+e.message, true); }
};

// ricerca libera fra tutte le prenotazioni scoperte
window.cercaPrenotazione = async (idtrx) => {
  const o = ORF.orfane.find(x=>x.ricevuta.idtrx===idtrx);
  const r = o.ricevuta;
  const ok = await dialogo(`Abbina ${r.numero}`,
    `${eur(r.importo)} · emessa il ${r.data.slice(0,10)}`,
    `<label>Cerca per nome, data o importo</label>
     <input type="search" id="cp-q" placeholder="es. vanreekum oppure 02/06" autocomplete="off">
     <div id="cp-lista" style="max-height:230px;overflow:auto;margin-top:10px"></div>
     <input type="hidden" id="cp-sel">`, 'Abbina');
  if(!ok) return;
  const id = $('#cp-sel').value;
  if(!id){ toast('Nessuna prenotazione selezionata', true); return; }
  const p = ORF.scoperte.find(x=>x.id===id);
  const delta = r.importo - p.atteso;
  try{
    await api('/stato', {method:'POST', body: JSON.stringify({
      id, stato:'emessa', idtrx, numero:r.numero, data:r.giorno, importo:r.importo,
      nota:`abbinata manualmente (${delta>=0?'+':''}${delta.toFixed(2)} € rispetto all'atteso)` })});
    const el = document.getElementById('or-'+idtrx);
    if(el) el.remove();
    ORF.orfane = ORF.orfane.filter(x=>x.ricevuta.idtrx!==idtrx);
    ORF.scoperte = ORF.scoperte.filter(x=>x.id!==id);
    for(const x of ORF.orfane) x.candidati = x.candidati.filter(k=>k.id!==id);
    toast(`${r.numero} → ${p.nome || 'senza nome'}`);
    DATI = null; PROP = null;
  }catch(e){ toast('Non riesco a salvare: '+e.message, true); }
};

window.saltaOrfana = (idtrx) => {
  const el = document.getElementById('or-'+idtrx);
  if(el) el.remove();
  ORF.orfane = ORF.orfane.filter(x=>x.ricevuta.idtrx!==idtrx);
};

async function caricaProposte(){
  $('#proposte').innerHTML = '<div class="loading">Cerco le corrispondenze…</div>';
  try{
    PROP = await api(`/proposte?dal=${$('#dal').value}&al=${$('#al').value}`);
    renderProposte();
  }catch(e){
    $('#proposte').innerHTML = `<div class="empty">Non riesco a calcolare le proposte.<br><small>${e.message}</small></div>`;
  }
}

const fascia = n => n>=95 ? 'alta' : n>=75 ? 'media' : 'bassa';

function renderProposte(){
  if(!PROP) return;
  const r = PROP.riepilogo;
  $('#kpis-st').innerHTML = `
    <div class="kpi warn"><b>${r.scoperte}</b><span>Scoperte</span></div>
    <div class="kpi ok"><b>${r.conProposta}</b><span>Con proposta</span></div>
    <div class="kpi"><b>${r.senzaProposta}</b><span>Senza</span></div>
    <div class="kpi"><b>${r.orfaneDisponibili}</b><span>Orfane</span></div>`;

  const certe = PROP.proposte.filter(p => p.migliore >= 97);
  $('#massa').innerHTML = certe.length ? `
    <div class="massa">
      <b>${certe.length} corrispondenze quasi certe</b><br>
      Stesso giorno o giorno vicino, con scarto di pochi centesimi.
      <button onclick="confermaMassa()">Conferma tutte le ${certe.length}</button>
    </div>` : '';

  $('#proposte').innerHTML = PROP.proposte.length
    ? PROP.proposte.map(cardProposta).join('')
    : '<div class="empty">Nessuna proposta: tutte le prenotazioni sono state sistemate.</div>';
}

function cardProposta(p){
  const pr = p.prenotazione;
  const f = fascia(p.migliore);
  const opts = p.candidati.map((c,i)=>{
    const segno = c.deltaImporto>=0 ? '+' : '';
    return `<option value="${i}">${c.numero} · ${eur(c.importo)} · ${segno}${c.deltaImporto.toFixed(2)} € · ${c.deltaGiorni>=0?'+':''}${c.deltaGiorni}gg${c.indizio?' · '+c.indizio:''}</option>`;
  }).join('');
  return `<div class="prop ${f}" id="pr-${pr.id}">
    <div class="prop-top">
      <div>
        <div class="nome">${badgeCamere(pr.camere)}${pr.nome || 'Ospite senza nome'}</div>
        <div class="meta">${gg(pr.checkin)} → ${gg(pr.checkout)} · ${pr.notti} ${pr.notti==1?'notte':'notti'} · ${pr.canale}</div>
      </div>
      <div style="text-align:right">
        <div class="eur">${eur(pr.atteso)}</div>
        <span class="punti ${f}">${p.migliore}</span>
      </div>
    </div>
    <select id="sel-${pr.id}">${opts}</select>
    <div class="azioni">
      <button class="ok" onclick="conferma('${pr.id}')">Abbina</button>
      <button onclick="vediPdfScelto('${pr.id}')">Vedi ricevuta</button>
      <button onclick="saltaProposta('${pr.id}')">Nessuna</button>
    </div>
  </div>`;
}

async function salvaAbbinamento(id, c){
  await api('/stato', {method:'POST', body: JSON.stringify({
    id, stato:'emessa', idtrx:c.idtrx, numero:c.numero, data:c.giorno, importo:c.importo,
    nota:`abbinata manualmente (${c.deltaImporto>=0?'+':''}${c.deltaImporto.toFixed(2)} €)` })});
}

window.conferma = async (id) => {
  const p = PROP.proposte.find(x=>x.prenotazione.id===id);
  const c = p.candidati[parseInt($('#sel-'+id).value,10)];
  try{
    await salvaAbbinamento(id, c);
    const el = document.getElementById('pr-'+id);
    if(el) el.remove();
    PROP.proposte = PROP.proposte.filter(x=>x.prenotazione.id!==id);
    toast('Abbinata a ' + c.numero);
    DATI = null;
  }catch(e){ toast('Non riesco a salvare: '+e.message, true); }
};

window.vediPdfScelto = (id) => {
  const p = PROP.proposte.find(x=>x.prenotazione.id===id);
  const c = p.candidati[parseInt($('#sel-'+id).value,10)];
  vediPdf(c.idtrx);
};

window.saltaProposta = (id) => {
  const el = document.getElementById('pr-'+id);
  if(el) el.remove();
  PROP.proposte = PROP.proposte.filter(x=>x.prenotazione.id!==id);
};

window.confermaMassa = async () => {
  const certe = PROP.proposte.filter(p => p.migliore >= 97);
  if(!await dialogo('Conferma automatica',
    `${certe.length} prenotazioni verranno abbinate alla ricevuta più probabile. Potrai sempre correggerle dalla scheda Prenotazioni.`,
    '', 'Conferma tutte')) return;
  let ok=0;
  for(const p of certe){
    try{ await salvaAbbinamento(p.prenotazione.id, p.candidati[0]); ok++; }
    catch(e){ /* proseguo con le altre */ }
    toast(`Abbinate ${ok} di ${certe.length}…`);
  }
  toast(`${ok} prenotazioni abbinate`);
  DATI = null;
  caricaProposte();
};

/* ---------- registro ricevute ---------- */
let RIC = null, FATT = null, TIPODOC = 'ricevute';

document.querySelectorAll('#tipo-doc button').forEach(b => b.onclick = ()=>{
  document.querySelectorAll('#tipo-doc button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  TIPODOC = b.dataset.t;
  $('#ric-nuova').style.display = TIPODOC==='ricevute' ? '' : 'none';
  if(TIPODOC==='fatture'){ FATT ? renderFatture() : caricaFatture(); }
  else { RIC ? renderRicevute() : caricaRicevute(); }
});

async function caricaFatture(){
  $('#lista-ric').innerHTML = '<div class="loading">Carico le fatture…</div>';
  try{
    FATT = await api(`/fatture?dal=${$('#dal').value}&al=${$('#al').value}`);
    renderFatture();
  }catch(e){
    $('#lista-ric').innerHTML = `<div class="empty">Non riesco a caricare.<br><small>${e.message}</small></div>`;
  }
}

function renderFatture(){
  if(!FATT) return;
  const f = FATT.fatture || [];
  const nostre = f.filter(x=>/^FE /.test(x.numero||''));
  $('#kpis-ric').innerHTML = `
    <div class="kpi ok"><b>${f.length}</b><span>Fatture</span></div>
    <div class="kpi"><b>${nostre.length}</b><span>Serie FE</span></div>
    <div class="kpi"><b>${f.length-nostre.length}</b><span>Altre</span></div>
    <div class="kpi ok" style="display:flex;align-items:center;justify-content:center"><b>${Math.round(FATT.totale||0).toLocaleString('it-IT')} €</b></div>`;

  $('#lista-ric').innerHTML = f.length ? `<table class="tab-ric">
    <tr><th>Data</th><th>Numero</th><th>Cliente</th><th style="text-align:right">Totale</th><th></th></tr>
    ${f.map(x=>`<tr>
      <td>${x.data ? x.data.slice(0,10) : ''}</td>
      <td>${/^FE /.test(x.numero||'') ? `<button class="numdoc" onclick="vediFattura('${x.numero}')">${x.numero}</button>` : `<span style="font-family:ui-monospace,Menlo,monospace;font-size:11.5px">${x.numero}</span>`}</td>
      <td>${(x.cliente||'').slice(0,26)}</td>
      <td class="num">${eur(x.totale)}</td>
      <td class="ann">${/^FE /.test(x.numero||'') ? `<button title="Invia copia" style="color:var(--info)" onclick="inviaCopia('${x.numero}')">@</button>` : ''}</td>
    </tr>`).join('')}
    </table>` : '<div class="empty">Nessuna fattura nel periodo.</div>';
}

window.vediFattura = async (numero)=>{
  try{
    const l = await api('/condividiFattura', {method:'POST', body: JSON.stringify({numero})});
    window.open(l.link, '_blank');
  }catch(e){ toast('Copia non disponibile: '+e.message, true); }
};

window.inviaCopia = async (numero)=>{
  const ok = await dialogo('Invia copia', `Fattura ${numero}`,
    `<label>Indirizzo email</label><input id="ic-mail" placeholder="nome@dominio.it">`, 'Invia');
  if(!ok) return;
  const dest = $('#ic-mail').value.trim();
  if(!dest){ toast('Nessun indirizzo', true); return; }
  toast('Invio in corso…');
  try{
    const l = await api('/condividiFattura', {method:'POST', body: JSON.stringify({numero})});
    await api('/inviaMail', {method:'POST', body: JSON.stringify({
      a: dest, oggetto: `Fattura ${numero} · InternoUno`,
      testo: `Gentile cliente,\n\nin allegato il collegamento alla fattura ${numero}.\n\n${l.link}\n\nLa fattura elettronica originale le sarà recapitata dal Sistema di Interscambio.\n\nCordiali saluti\nInternoUno` })});
    toast('Copia inviata');
  }catch(e){ toast('Invio non riuscito: '+e.message, true); }
};

async function caricaRicevute(){
  $('#lista-ric').innerHTML = '<div class="loading">Carico le ricevute…</div>';
  try{
    RIC = await api(`/dco?dal=${$('#dal').value}&al=${$('#al').value}`);
    renderRicevute();
  }catch(e){
    $('#lista-ric').innerHTML = `<div class="empty">Non riesco a caricare.<br><small>${e.message}</small></div>`;
  }
}

function renderRicevute(){
  if(!RIC) return;
  const valide = RIC.documenti.filter(x=>x.tipo==='V' && !x.annullata);
  const annull = RIC.documenti.filter(x=>x.annullata);
  const rett   = RIC.documenti.filter(x=>x.tipo!=='V');
  const tot = valide.reduce((s,x)=>s+x.importo,0);

  $('#kpis-ric').innerHTML = `
    <div class="kpi ok"><b>${valide.length}</b><span>Valide</span></div>
    <div class="kpi"><b>${annull.length}</b><span>Annullate</span></div>
    <div class="kpi"><b>${rett.length}</b><span>Note di annullo</span></div>
    <div class="kpi ok" style="display:flex;align-items:center;justify-content:center">
      <b style="font-size:19px">${Math.round(tot).toLocaleString('it-IT')} €</b></div>`;

  const righe = [...RIC.documenti].sort((a,b)=> a.data < b.data ? 1 : -1);
  $('#lista-ric').innerHTML = righe.length ? `<table class="tab-ric">
    <tr><th>Data</th><th>Numero</th><th>Tipo</th><th style="text-align:right">Importo</th><th></th></tr>
    ${righe.map(x=>{
      const st = x.annullata ? '<span class="pill p-esclusa">annullata</span>'
               : x.tipo!=='V' ? '<span class="pill p-fattura">annullo</span>'
               : '<span class="pill p-emessa">valida</span>';
      return `<tr>
        <td>${x.dataRaw ? x.dataRaw.slice(0,10) : ''}</td>
        <td><button class="numdoc" onclick="vediPdf('${x.id}')">${x.numero}</button></td>
        <td>${st}</td>
        <td class="num">${eur(x.importo)}</td>
        <td class="ann">${x.tipo==='V' && !x.annullata ? `<button title="Annulla" onclick="annullaRic('${x.id}','${x.numero}')">✕</button>` : ''}</td>
      </tr>`;
    }).join('')}
    </table>` : '<div class="empty">Nessuna ricevuta nel periodo.</div>';
}

window.annullaRic = async (idtrx, numero) => {
  if(!await dialogo('Annulla ricevuta',
    `${numero} verrà annullata presso l\u2019Agenzia delle Entrate.`, '', 'Annulla ricevuta')) return;
  try{
    const r = await api('/annulla', {method:'POST', body: JSON.stringify({idtrx})});
    toast(r.risposta && r.risposta.gia_annullato ? 'era già annullata' : numero+' annullata');
    RIC = null; DATI = null; caricaRicevute();
  }catch(e){ toast('Annullo non riuscito: '+e.message, true); }
};

$('#ric-ricarica').onclick = ()=>{ RIC=null; caricaRicevute(); };

$('#ric-csv').onclick = ()=>{
  if(!RIC) return;
  const righe = [['Data','Numero','Tipo','Importo']];
  for(const x of [...RIC.documenti].sort((a,b)=> a.data < b.data ? 1 : -1)){
    righe.push([
      x.dataRaw || '', x.numero,
      x.annullata ? 'annullata' : (x.tipo!=='V' ? 'annullo' : 'valida'),
      String(x.importo).replace('.', ',')
    ]);
  }
  const csv = righe.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `ricevute_${$('#dal').value}_${$('#al').value}.csv`;
  a.click();
  toast('Elenco scaricato');
};

$('#ric-nuova').onclick = async ()=>{
  const oggi = new Date().toISOString().slice(0,10);
  const ok = await dialogo('Nuova ricevuta', 'Emissione manuale, senza prenotazione collegata',
    `<label>Descrizione</label>
     <textarea id="l-desc" rows="2" placeholder="Soggiorno dal … al … del Sig./Sig.ra …"></textarea>
     <label>Importo soggiorno (IVA 10%)</label>
     <input type="number" step="0.01" id="l-imp" placeholder="0,00">
     <label>Imposta di soggiorno da aggiungere (facoltativa)</label>
     <input type="number" step="0.01" id="l-tax" placeholder="0,00">
     <label>Pagamento</label>
     <select id="l-pag"><option value="PE">Elettronico</option><option value="PC">Contanti</option></select>`,
    'Emetti');
  if(!ok) return;
  const importo = parseFloat($('#l-imp').value);
  if(!importo || importo<=0){ toast('Importo non valido', true); return; }
  const tax = parseFloat($('#l-tax').value) || 0;
  toast('Emissione in corso…');
  try{
    const r = await api('/emettiLibera', {method:'POST', body: JSON.stringify({
      importo, cityTax: tax, includiTassa: tax>0,
      descrizione: $('#l-desc').value.trim(), pagamento: $('#l-pag').value })});
    toast('Emessa ' + r.documento.progressivo);
    RIC = null; caricaRicevute();
  }catch(e){ toast('Emissione non riuscita: '+e.message, true); }
};

/* ---------- tabs ---------- */
let tmr;
$('#q').addEventListener('input', e => {
  clearTimeout(tmr);
  tmr = setTimeout(()=>{ QUERY = e.target.value; render(); }, 180);
});
$('#clienti').onclick = ()=> location.href = 'clienti.html';

$('#pwd').onclick = async () => {
  if(!await dialogo('Rinnova password Fisconline',
    'La password dell\u2019Agenzia delle Entrate scade ogni 90 giorni. Il rinnovo la mantiene identica: non dovrai aggiornare nulla.',
    '', 'Rinnova')) return;
  toast('Rinnovo in corso…');
  try{
    const r = await api('/rinnova', {method:'POST', body:'{}'});
    toast(r.esito === false ? 'Rinnovo non riuscito' : 'Password rinnovata per altri 90 giorni', r.esito === false);
  }catch(e){ toast('Rinnovo non riuscito: '+e.message, true); }
};

$('#q-x').onclick = ()=>{ $('#q').value=''; QUERY=''; render(); };

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  VIEW = t.dataset.view;
  $('#v-operativo').classList.toggle('hidden', VIEW!=='operativo');
  $('#v-ricevute').classList.toggle('hidden', VIEW!=='ricevute');
  $('#v-storico').classList.toggle('hidden', VIEW!=='storico');
  if(VIEW==='storico' && !ORF && !PROP) caricaOrfane();
  if(VIEW==='ricevute' && TIPODOC==='ricevute' && !RIC) caricaRicevute();
  if(VIEW==='ricevute' && TIPODOC==='fatture' && !FATT) caricaFatture();
  if(VIEW==='operativo' && !DATI) carica();
});


/* ---------- avvio ---------- */
(async function(){
  if(!TOKEN) chiediToken();
  applicaRecenti();
  renderCtx();
  carica();
})();
</script>
