<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enable Banking — Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:16px;max-width:700px;margin:0 auto}
h1{font-size:18px;font-weight:700;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h2{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
button{padding:10px 18px;border-radius:10px;border:none;background:#1a4a7a;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin:4px 4px 4px 0}
button.sec{background:#e8f5ee;color:#1a7a4a}
button.sml{font-size:12px;padding:6px 12px;background:#eef4fd;color:#1a4a7a}
select,input{padding:9px 12px;border-radius:8px;border:1.5px solid #e4e3dd;font-size:13px;background:#f5f4f0;color:#1a1a1a;display:block;width:100%;margin-bottom:8px}
.log{background:#1a1a1a;border-radius:10px;padding:10px;font-family:monospace;font-size:11px;color:#ccc;max-height:120px;overflow-y:auto;margin-top:8px;word-break:break-all}
.log .ok{color:#00ff88} .log .er{color:#ff5555} .log .in{color:#87ceeb}
.session-box{padding:10px;border:1.5px solid #e4e3dd;border-radius:10px;margin-bottom:8px}
.session-box h3{font-size:13px;font-weight:700;margin-bottom:4px}
.session-box .sub{font-size:11px;color:#888;margin-bottom:6px}
.iban-btn{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;border:1.5px solid #e4e3dd;background:#f5f4f0;font-size:12px;font-family:monospace;cursor:pointer;margin:3px 0;color:#1a1a1a}
.iban-btn:hover,.iban-btn.sel{background:#eef4fd;border-color:#1a4a7a;color:#1a4a7a;font-weight:700}
.tx-row{padding:7px 0;border-bottom:1px solid #f0efe9;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.tx-row:last-child{border-bottom:none}
.tx-date{font-size:11px;color:#888;min-width:80px}
.tx-desc{font-size:12px;flex:1}
.tx-amt{font-size:13px;font-weight:700;white-space:nowrap}
.pos{color:#1a7a4a} .neg{color:#b83232}
.empty{color:#888;font-size:13px;text-align:center;padding:20px}
</style>
</head>
<body>
<h1>🏦 Enable Banking — Test</h1>

<!-- TOKEN -->
<div class="card">
  <h2>Token iCompta</h2>
  <input id="token" type="password" placeholder="Token iCompta">
</div>

<!-- NUOVA SESSIONE -->
<div class="card">
  <h2>Collega nuova banca</h2>
  <select id="bank-sel">
    <option value="Banca Sella">Banca Sella (personale + azienda)</option>
    <option value="FinecoBank">FinecoBank</option>
  </select>
  <select id="psu-sel">
    <option value="personal">Personal</option>
    <option value="business">Business</option>
  </select>
  <button onclick="startAuth()">🔗 Autorizza banca</button>
  <div id="auth-log" class="log" style="display:none"></div>
</div>

<!-- SESSIONI + DOWNLOAD TX -->
<div class="card">
  <h2>Sessioni attive — seleziona conto e scarica</h2>
  <button class="sec" onclick="loadSessions()">🔄 Aggiorna sessioni</button>
  <div id="sessions-list" style="margin-top:12px">
    <div class="empty">Premi "Aggiorna sessioni"</div>
  </div>
</div>

<!-- RISULTATO TX -->
<div class="card" id="tx-card" style="display:none">
  <h2>Transazioni</h2>
  <div id="tx-date-wrap" style="margin-bottom:8px">
    <input type="date" id="date-from">
    <button onclick="downloadTx()">📥 Scarica</button>
  </div>
  <div id="tx-result"></div>
</div>

<script>
var WORKER = 'https://icompta-worker.f-castiglioni.workers.dev';
var TOKEN = localStorage.getItem('icompta_token') || '';
var selectedSession = null;
var selectedAccount = null;

// Init
document.getElementById('token').value = TOKEN;
document.getElementById('token').addEventListener('input', function(){
  TOKEN = this.value.trim();
  localStorage.setItem('icompta_token', TOKEN);
});
// data default 60 giorni fa
var d60 = new Date(Date.now() - 60*24*3600*1000);
document.getElementById('date-from').value = d60.toISOString().slice(0,10);

function log(msg, type) {
  var el = document.getElementById('auth-log');
  el.style.display = 'block';
  var ts = new Date().toLocaleTimeString('it-IT',{hour12:false});
  el.innerHTML += '<div class="'+(type||'in')+'">['+ts+'] '+msg.replace(/</g,'&lt;')+'</div>';
  el.scrollTop = el.scrollHeight;
}

async function api(method, path, body) {
  var r = await fetch(WORKER + path, {
    method,
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

async function startAuth() {
  var bank = document.getElementById('bank-sel').value;
  var psu = document.getElementById('psu-sel').value;
  log('Richiesta autorizzazione '+bank+' ('+psu+')...','in');
  try {
    var data = await api('GET','/api/enable-banking/auth?bank='+encodeURIComponent(bank)+'&psu_type='+psu);
    if (data.ok) {
      log('✅ URL ottenuto — apertura pagina banca...','ok');
      window.open(data.url, '_blank');
      log('Dopo aver autorizzato premi "Aggiorna sessioni"','in');
    } else {
      log('Errore: '+JSON.stringify(data),'er');
    }
  } catch(e) { log('Errore: '+e.message,'er'); }
}

async function loadSessions() {
  var list = document.getElementById('sessions-list');
  list.innerHTML = '<div class="empty">Caricamento...</div>';
  selectedSession = null; selectedAccount = null;
  document.getElementById('tx-card').style.display = 'none';
  try {
    var sessions = await api('GET','/api/enable-banking/sessions');
    if (!Array.isArray(sessions) || !sessions.length) {
      list.innerHTML = '<div class="empty">Nessuna sessione. Autorizza una banca qui sopra.</div>';
      return;
    }
    list.innerHTML = sessions.map(function(s,si) {
      var exp = s.valid_until ? new Date(s.valid_until).toLocaleDateString('it-IT') : '?';
      var accounts = (s.accounts||[]);
      var ibans = accounts.map(function(a,ai) {
        var iban = (a.account_id && a.account_id.iban) || a.uid || '?';
        var type = a.cash_account_type || '';
        return '<button class="iban-btn" onclick="selectAccount('+si+','+ai+',this)">' +
          iban + (type?' ('+type+')':'') + '</button>';
      }).join('');
      return '<div class="session-box" id="sess-'+si+'">' +
        '<h3>'+(s.aspsp && s.aspsp.name || 'Banca')+' — '+(s.psu_type||'?')+'</h3>' +
        '<div class="sub">Valido fino: '+exp+' | '+(accounts.length)+' conto/i</div>' +
        '<div>'+ibans+'</div>' +
        '</div>';
    }).join('');
    window._sessions = sessions;
  } catch(e) {
    list.innerHTML = '<div class="empty" style="color:#b83232">Errore: '+e.message+'</div>';
  }
}

function selectAccount(si, ai, btn) {
  // Deseleziona tutti
  document.querySelectorAll('.iban-btn').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  selectedSession = window._sessions[si];
  selectedAccount = (selectedSession.accounts||[])[ai];
  document.getElementById('tx-card').style.display = 'block';
  document.getElementById('tx-result').innerHTML = '<div class="empty">Premi Scarica per caricare le transazioni</div>';
}

async function downloadTx() {
  if (!selectedSession || !selectedAccount) return;
  var dateFrom = document.getElementById('date-from').value;
  var result = document.getElementById('tx-result');
  result.innerHTML = '<div class="empty">Caricamento...</div>';
  try {
    var data = await api('GET',
      '/api/enable-banking/transactions?session_key='+encodeURIComponent(selectedSession.key)+
      '&account_id='+encodeURIComponent(selectedAccount.uid)+
      '&date_from='+dateFrom);
    if (data.ok) {
      var txs = data.transactions || [];
      if (!txs.length) { result.innerHTML='<div class="empty">Nessuna transazione nel periodo</div>'; return; }
      result.innerHTML = '<div style="font-size:12px;color:#888;margin-bottom:8px">✅ '+txs.length+' transazioni</div>' +
        txs.map(function(t) {
          var amt = parseFloat((t.transaction_amount && t.transaction_amount.amount)||0);
          var isCredit = t.credit_debit_indicator === 'CRDT';
          if (!isCredit) amt = -Math.abs(amt);
          var desc = (t.remittance_information && t.remittance_information[0]) ||
                     (t.creditor && t.creditor.name) || (t.debtor && t.debtor.name) || '—';
          return '<div class="tx-row">' +
            '<div class="tx-date">'+(t.booking_date||'?')+'</div>' +
            '<div class="tx-desc">'+desc+'</div>' +
            '<div class="tx-amt '+(amt>=0?'pos':'neg')+'">'+(amt>=0?'+':'')+amt.toFixed(2)+'€</div>' +
            '</div>';
        }).join('');
    } else {
      result.innerHTML='<div class="empty" style="color:#b83232">Errore: '+JSON.stringify(data)+'</div>';
    }
  } catch(e) {
    result.innerHTML='<div class="empty" style="color:#b83232">Errore: '+e.message+'</div>';
  }
}
</script>
</body>
</html>
