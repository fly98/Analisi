<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enable Banking — Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:16px}
h1{font-size:18px;font-weight:700;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h2{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
button{padding:10px 18px;border-radius:10px;border:none;background:#1a4a7a;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
button.sec{background:#e8f5ee;color:#1a7a4a}
button.red{background:#fdf0f0;color:#b83232}
select,input{padding:8px 12px;border-radius:8px;border:1.5px solid #e4e3dd;font-size:13px;margin:4px;background:#f5f4f0;color:#1a1a1a;width:100%}
.log{background:#1a1a1a;border-radius:10px;padding:10px;font-family:monospace;font-size:11px;color:#ccc;max-height:200px;overflow-y:auto;margin-top:8px;word-break:break-all}
.log .ok{color:#00ff88}
.log .er{color:#ff5555}
.log .in{color:#87ceeb}
.status{font-size:12px;color:#666;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin:2px}
.badge.green{background:#e8f5ee;color:#1a7a4a}
.badge.red{background:#fdf0f0;color:#b83232}
.badge.blue{background:#eef4fd;color:#1a4a7a}
.tx-row{padding:6px 0;border-bottom:1px solid #f0efe9;font-size:12px;display:flex;justify-content:space-between}
.tx-row:last-child{border-bottom:none}
</style>
</head>
<body>
<h1>🏦 Enable Banking — Pagina di Test</h1>

<div class="card">
  <h2>1. Configurazione</h2>
  <input id="token" type="password" placeholder="Token iCompta" value="">
  <div class="status" id="token-status"></div>
</div>

<div id="auth-log" class="log" style="display:none;margin-bottom:8px"></div>

<div class="card">
  <h2>3. Sessioni attive</h2>
  <button class="sec" onclick="loadSessions()">🔄 Carica sessioni</button>
  <div id="sessions-body" style="margin-top:8px"></div>
</div>

<div class="card">
  <h2>4. Test scarica transazioni</h2>
  <select id="session-sel"><option value="">— seleziona sessione —</option></select>
  <select id="account-sel"><option value="">— seleziona conto —</option></select>
  <input id="date-from" type="date" value="">
  <button onclick="loadTx()">📥 Scarica transazioni</button>
  <div id="tx-body" style="margin-top:8px"></div>
</div>

<script>
var WORKER = 'https://icompta-worker.f-castiglioni.workers.dev';
var TOKEN = localStorage.getItem('icompta_token') || '';

document.getElementById('token').value = TOKEN;
document.getElementById('token').addEventListener('input', function() {
  TOKEN = this.value.trim();
  localStorage.setItem('icompta_token', TOKEN);
});

// Data default: 30 giorni fa
var d30 = new Date(Date.now() - 30*24*3600*1000);
document.getElementById('date-from').value = d30.toISOString().slice(0,10);

function log(el, msg, type) {
  var div = document.getElementById(el);
  div.style.display = 'block';
  var ts = new Date().toLocaleTimeString('it-IT',{hour12:false});
  div.innerHTML += '<div class="' + (type||'in') + '">['+ts+'] ' + msg.replace(/</g,'&lt;') + '</div>';
  div.scrollTop = div.scrollHeight;
}

async function api(method, path, body) {
  var r = await fetch(WORKER + path, {
    method,
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

async function startAuth() {
  var bank = document.getElementById('bank').value;
  var psuType = document.getElementById('psu_type').value;
  log('auth-log', 'Richiesta autorizzazione a ' + bank + ' (' + psuType + ')...', 'in');
  try {
    var data = await api('GET', '/api/enable-banking/auth?bank=' + encodeURIComponent(bank) + '&psu_type=' + psuType);
    if (data.ok) {
      log('auth-log', 'URL ottenuto! Apertura banca...', 'ok');
      log('auth-log', 'State: ' + data.state, 'in');
      window.open(data.url, '_blank');
    } else {
      log('auth-log', 'Errore: ' + JSON.stringify(data), 'er');
    }
  } catch(e) {
    log('auth-log', 'Errore: ' + e.message, 'er');
  }
}

var sessions = [];
async function renewAuth(bank, psuType) {
  log('auth-log', 'Rinnovo autorizzazione ' + bank + '...', 'in');
  try {
    var r = await api('GET', '/api/enable-banking/auth?bank=' + encodeURIComponent(bank) + '&psu_type=' + psuType);
    if (r.ok) {
      log('auth-log', 'URL ottenuto — apertura banca...', 'ok');
      document.getElementById('auth-log').style.display = 'block';
      window.open(r.url, '_blank');
    } else {
      log('auth-log', 'Errore: ' + JSON.stringify(r), 'er');
      document.getElementById('auth-log').style.display = 'block';
    }
  } catch(e) {
    log('auth-log', 'Errore: ' + e.message, 'er');
    document.getElementById('auth-log').style.display = 'block';
  }
}

async function loadSessions() {
  var data = await api('GET', '/api/enable-banking/sessions');
  sessions = Array.isArray(data) ? data : [];
  var body = document.getElementById('sessions-body');
  var sel = document.getElementById('session-sel');
  sel.innerHTML = '<option value="">— seleziona sessione —</option>';
  if (!sessions.length) {
    body.innerHTML = '<div class="status">Nessuna sessione trovata.</div>';
    return;
  }
  body.innerHTML = sessions.map(function(s) {
    var exp = s.valid_until ? new Date(s.valid_until).toLocaleDateString('it-IT') : '?';
    var accounts = (s.accounts||[]).map(function(a) {
      return '<span class="badge blue">' + (a.account_id && a.account_id.iban || a.uid || '?') + '</span>';
    }).join('');
    return '<div style="padding:8px 0;border-bottom:1px solid #f0efe9">' +
      '<div style="font-size:12px;font-weight:700">' + (s.aspsp && s.aspsp.name || s.key) + ' — ' + (s.psu_type||'?') + '</div>' +
      '<div style="font-size:11px;color:#888">Valido fino: ' + exp + ' | Session: ' + (s.session_id||'?').slice(0,8) + '...</div>' +
      '<div style="margin-top:4px">' + accounts + '</div>' +
      '</div>';
  }).join('');
  // Popola select sessioni
  sessions.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.key;
    opt.textContent = (s.aspsp && s.aspsp.name || s.key) + ' — ' + (s.psu_type||'?');
    sel.appendChild(opt);
  });
}

document.getElementById('session-sel').addEventListener('change', function() {
  var key = this.value;
  var s = sessions.find(function(x){ return x.key === key; });
  var accSel = document.getElementById('account-sel');
  accSel.innerHTML = '<option value="">— seleziona conto —</option>';
  if (!s || !s.accounts) return;
  s.accounts.forEach(function(a) {
    var opt = document.createElement('option');
    opt.value = a.uid;
    opt.textContent = (a.account_id && a.account_id.iban || a.uid || '?') + ' (' + (a.cash_account_type||'') + ')';
    accSel.appendChild(opt);
  });
});

async function loadTx() {
  var sessionKey = document.getElementById('session-sel').value;
  var accountId = document.getElementById('account-sel').value;
  var dateFrom = document.getElementById('date-from').value;
  if (!sessionKey || !accountId) { alert('Seleziona sessione e conto'); return; }
  var body = document.getElementById('tx-body');
  body.innerHTML = '<div class="status">Caricamento...</div>';
  try {
    var data = await api('GET', '/api/enable-banking/transactions?session_key=' + encodeURIComponent(sessionKey) + '&account_id=' + encodeURIComponent(accountId) + '&date_from=' + dateFrom);
    if (data.ok) {
      var txs = data.transactions || [];
      body.innerHTML = '<div class="status" style="margin-bottom:8px">✅ ' + txs.length + ' transazioni trovate</div>' +
        txs.slice(0, 20).map(function(t) {
          var amt = t.transaction_amount && t.transaction_amount.amount;
          var isCredit = t.credit_debit_indicator === 'CRDT';
          var desc = (t.remittance_information && t.remittance_information[0]) || t.note || '—';
          return '<div class="tx-row">' +
            '<div><div style="font-weight:600">' + (t.booking_date||'?') + '</div>' +
            '<div style="color:#666">' + desc + '</div></div>' +
            '<div style="font-weight:700;color:' + (isCredit?'#1a7a4a':'#b83232') + '">' +
            (isCredit?'+':'-') + Math.abs(parseFloat(amt||0)).toFixed(2) + '€</div>' +
            '</div>';
        }).join('') +
        (txs.length > 20 ? '<div class="status">...e altre ' + (txs.length-20) + ' transazioni</div>' : '');
    } else {
      body.innerHTML = '<div class="status" style="color:#b83232">Errore: ' + JSON.stringify(data) + '</div>';
    }
  } catch(e) {
    body.innerHTML = '<div class="status" style="color:#b83232">Errore: ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
