<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Assistant — Controllo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
  h1 { color: #e94560; margin-bottom: 4px; font-size: 1.4rem; }
  #ts { color: #666; font-size: 0.75rem; margin-bottom: 16px; }
  .refresh-btn { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-bottom: 16px; }
  h2 { color: #aaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .card { background: #16213e; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .card.on { background: #1e2d1e; border: 1px solid #4caf50; }
  .card.unavailable { opacity: 0.4; }
  .card-name { font-size: 0.85rem; font-weight: 600; }
  .card-state { font-size: 0.75rem; color: #aaa; }
  .card.on .card-state { color: #4caf50; }
  .toggle-btn { background: #333; color: #eee; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; width: 100%; }
  .card.on .toggle-btn { background: #4caf50; color: #000; }
  .card.unavailable .toggle-btn { pointer-events: none; }
  #loading { color: #aaa; text-align: center; padding: 40px; }
</style>
</head>
<body>
<h1>🏠 Home Assistant</h1>
<div id="ts"></div>
<button class="refresh-btn" onclick="loadStates()">⟳ Aggiorna</button>
<div id="content"><div id="loading">Caricamento...</div></div>

<script>
const WORKER = 'https://ha-worker.f-castiglioni.workers.dev'

async function loadStates() {
  document.getElementById('loading') && (document.getElementById('content').innerHTML = '<div id="loading">Caricamento...</div>')
  try {
    const resp = await fetch(WORKER + '/states')
    const states = await resp.json()

    document.getElementById('ts').textContent = 'Aggiornato: ' + new Date().toLocaleTimeString('it-IT')

    const lights = states.filter(e => e.entity_id.startsWith('light.'))
    const switches = states.filter(e => e.entity_id.startsWith('switch.') && !e.attributes.friendly_name?.toLowerCase().includes('auto') && !e.attributes.friendly_name?.toLowerCase().includes('enabled') && !e.attributes.friendly_name?.toLowerCase().includes('abilitato'))

    let html = ''

    html += '<h2>💡 Luci</h2><div class="grid">'
    lights.forEach(e => {
      const name = e.attributes.friendly_name || e.entity_id
      const st = e.state
      const cls = st === 'on' ? 'on' : st === 'unavailable' ? 'unavailable' : ''
      const label = st === 'on' ? 'Spegni' : 'Accendi'
      const action = st === 'on' ? 'turn_off' : 'turn_on'
      html += `<div class="card ${cls}">
        <div class="card-name">${name}</div>
        <div class="card-state">${st}</div>
        <button class="toggle-btn" onclick="callService('light','${action}','${e.entity_id}')">${label}</button>
      </div>`
    })
    html += '</div>'

    html += '<h2>🔌 Switch</h2><div class="grid">'
    switches.slice(0, 20).forEach(e => {
      const name = e.attributes.friendly_name || e.entity_id
      const st = e.state
      const cls = st === 'on' ? 'on' : ''
      const label = st === 'on' ? 'Spegni' : 'Accendi'
      const action = st === 'on' ? 'turn_off' : 'turn_on'
      html += `<div class="card ${cls}">
        <div class="card-name">${name}</div>
        <div class="card-state">${st}</div>
        <button class="toggle-btn" onclick="callService('switch','${action}','${e.entity_id}')">${label}</button>
      </div>`
    })
    html += '</div>'

    document.getElementById('content').innerHTML = html

  } catch(e) {
    document.getElementById('content').innerHTML = '<div id="loading">Errore: ' + e.message + '</div>'
  }
}

async function callService(domain, service, entity_id) {
  try {
    const resp = await fetch(WORKER + '/call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain, service, entity_id })
    })
    const data = await resp.json()
    setTimeout(loadStates, 1000)
  } catch(e) {
    alert('Errore: ' + e.message)
  }
}

loadStates()
</script>
</body>
</html>
