<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>HA Lights Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { color: #e94560; }
  .card { background: #16213e; border-radius: 12px; padding: 16px; margin: 10px 0; display: flex; align-items: center; gap: 12px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .on { background: #f5c518; box-shadow: 0 0 8px #f5c518; }
  .off { background: #444; }
  .name { font-size: 1rem; }
  .bri { font-size: 0.8rem; color: #aaa; }
  #status { color: #aaa; margin: 10px 0; }
  #raw { background: #0a0a1a; border-radius: 8px; padding: 12px; font-size: 0.75rem; color: #88f; white-space: pre-wrap; word-break: break-all; margin-top: 16px; display: none; }
  button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-right: 8px; }
  .sec { background: #444; }
</style>
</head>
<body>
<h1>💡 Home Assistant — Luci</h1>
<button onclick="loadLights()">Aggiorna</button>
<button class="sec" onclick="toggleRaw()">Debug</button>
<div id="status">Caricamento...</div>
<div id="lights"></div>
<div id="raw"></div>

<script>
const WORKER = 'https://ha-worker.f-castiglioni.workers.dev'
let lastRaw = ''

function toggleRaw() {
  const el = document.getElementById('raw')
  el.style.display = el.style.display === 'none' ? 'block' : 'none'
}

async function loadLights() {
  document.getElementById('status').textContent = 'Caricamento...'
  document.getElementById('lights').innerHTML = ''
  try {
    const resp = await fetch(WORKER + '/lights')
    const text = await resp.text()
    lastRaw = text
    document.getElementById('raw').textContent = 'HTTP ' + resp.status + '\n\n' + text

    const data = JSON.parse(text)

    if (!Array.isArray(data)) {
      document.getElementById('status').textContent = '⚠️ Errore dal worker: ' + (data.error || JSON.stringify(data))
      return
    }

    const on = data.filter(l => l.state === 'on')
    const off = data.filter(l => l.state === 'off')

    document.getElementById('status').textContent =
      `Totale: ${data.length} luci — Accese: ${on.length} — Spente: ${off.length}`

    const container = document.getElementById('lights')

    if (on.length) {
      const h = document.createElement('h3')
      h.textContent = '🟡 Accese'
      container.appendChild(h)
      on.forEach(l => container.appendChild(makeCard(l)))
    }
    if (off.length) {
      const h = document.createElement('h3')
      h.style.marginTop = '20px'
      h.textContent = '⚫ Spente'
      container.appendChild(h)
      off.forEach(l => container.appendChild(makeCard(l)))
    }
  } catch(e) {
    document.getElementById('status').textContent = 'Errore: ' + e.message
    document.getElementById('raw').textContent = lastRaw || 'nessuna risposta'
    document.getElementById('raw').style.display = 'block'
  }
}

function makeCard(light) {
  const div = document.createElement('div')
  div.className = 'card'
  const dot = document.createElement('div')
  dot.className = 'dot ' + light.state
  const info = document.createElement('div')
  const name = document.createElement('div')
  name.className = 'name'
  name.textContent = light.name
  info.appendChild(name)
  if (light.brightness) {
    const bri = document.createElement('div')
    bri.className = 'bri'
    bri.textContent = `Luminosità: ${Math.round(light.brightness / 255 * 100)}%`
    info.appendChild(bri)
  }
  div.appendChild(dot)
  div.appendChild(info)
  return div
}

loadLights()
</script>
</body>
</html>
