<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>InternoUno · Anagrafica clienti</title>
<link rel="icon" type="image/png" sizes="192x192" href="fisco-icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="fisco-icon-180.png">
<meta name="apple-mobile-web-app-title" content="Clienti">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --ink:#12283f; --muted:#657896; --line:#dde3ec; --bg:#eef1f5; --surface:#fff;
  --ok:#0d6e5e; --ok-bg:#e3f3ef; --danger:#b03a2e; --info:#2b5fb3; --info-bg:#e8effb;
  --radius:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:50px}
header{background:var(--ink);color:#fff;padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:20}
.htop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
h1{font-size:17px;margin:0;font-weight:650}
.sub{font-size:12px;color:#c3d2e6}
main{max-width:900px;margin:0 auto;padding:16px}

.barra{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cerca{position:relative;flex:1 1 200px;min-width:160px}
.cerca input{width:100%;font:inherit;font-size:14.5px;padding:9px 12px;
  border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
button.act{font:inherit;font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:9px;
  border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;white-space:nowrap}
button.act.primary{background:var(--ink);border-color:var(--ink);color:#fff}

.cli{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.cli .nome{font-weight:650;font-size:14.5px}
.cli .dati{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.cli .sdi{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;
  background:var(--info-bg);color:var(--info);font-family:ui-monospace,Menlo,monospace;margin-top:5px}
.cli .sdi.manca{background:#fdecea;color:var(--danger)}
.azioni{display:flex;gap:6px;flex:0 0 auto}
.azioni button{font:inherit;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;
  border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink)}
.azioni button.danger{color:var(--danger);border-color:#f0c9c5}

dialog{border:0;border-radius:16px;padding:0;max-width:460px;width:calc(100% - 32px);
  box-shadow:0 20px 60px rgba(18,40,63,.28)}
dialog::backdrop{background:rgba(18,40,63,.45)}
.dlg{padding:20px}
.dlg h3{margin:0 0 4px;font-size:17px}
.dlg p{margin:0 0 14px;color:var(--muted);font-size:13.5px}
.dlg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);margin:9px 0 4px;font-weight:650}
.dlg input{width:100%;font:inherit;padding:9px;border:1px solid var(--line);border-radius:8px;background:#fff}
.riga2{display:flex;gap:8px}.riga2>*{flex:1;min-width:0}
.cerca-piva{display:flex;gap:6px}.cerca-piva input{flex:1}
.esito{font-size:12px;margin-top:5px}.esito.ok{color:var(--ok)}.esito.ko{color:var(--danger)}
.btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btns button{font:inherit;font-size:14px;font-weight:600;padding:9px 16px;border-radius:9px;
  border:1px solid var(--line);background:#fff;cursor:pointer}
.btns button.primary{background:var(--ok);border-color:var(--ok);color:#fff}
.vuoto{text-align:center;color:var(--muted);padding:40px 20px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;background:var(--ink);
  color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;opacity:0;
  transition:opacity .2s;pointer-events:none;z-index:60;max-width:88%}
.toast.on{opacity:1}
.toast.ko{background:var(--danger)}
@media(max-width:640px){
  main{padding:12px}
  .cli{flex-direction:column}
  .azioni{width:100%}
  .azioni button{flex:1}
}
</style>
</head>
<body>

<header>
  <div class="htop">
    <div>
      <h1>Anagrafica clienti</h1>
      <div class="sub" id="conta">caricamento…</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="act" id="nuovo" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff">Nuovo</button>
      <button class="act" id="torna" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff">Cassa</button>
    </div>
  </div>
</header>

<main>
  <div class="barra">
    <div class="cerca"><input type="search" id="q" placeholder="Cerca nome, partita IVA, città…" autocomplete="off"></div>
  </div>
  <div id="lista"><div class="vuoto">Caricamento…</div></div>
</main>

<dialog id="dlg"><div class="dlg">
  <h3 id="dlg-t">Cliente</h3>
  <p id="dlg-p"></p>
  <div id="dlg-body"></div>
  <div class="btns">
    <button onclick="document.getElementById('dlg').close('no')">Annulla</button>
    <button class="primary" id="dlg-ok" onclick="document.getElementById('dlg').close('si')">Salva</button>
  </div>
</div></dialog>

<div class="toast" id="toast"></div>

<script>
const API = 'https://fisco-worker.f-castiglioni.workers.dev';
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('fisco_token') || '';
let CLIENTI = {};
let QUERY = '';

function toast(t, ko){
  const e = $('#toast');
  e.textContent = t; e.className = 'toast on' + (ko ? ' ko' : '');
  setTimeout(()=> e.className = 'toast', 2600);
}

async function api(path, opt={}){
  if(!TOKEN){
    TOKEN = prompt('Codice di accesso') || '';
    if(TOKEN) localStorage.setItem('fisco_token', TOKEN);
  }
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(API + path + sep + '_=' + Date.now(), {
    ...opt, cache:'no-store',
    headers:{'X-Token':TOKEN,'Content-Type':'application/json', ...(opt.headers||{})}
  });
  if(r.status === 401){ localStorage.removeItem('fisco_token'); TOKEN=''; throw new Error('codice non valido'); }
  const d = await r.json();
  if(!r.ok || d.error) throw new Error(d.error || ('errore '+r.status));
  return d;
}

function dialogo(titolo, testo, corpo, okLabel){
  $('#dlg-t').textContent = titolo;
  $('#dlg-p').textContent = testo;
  $('#dlg-body').innerHTML = corpo || '';
  $('#dlg-ok').textContent = okLabel || 'Salva';
  const d = $('#dlg');
  d.showModal();
  return new Promise(res => d.addEventListener('close', ()=>res(d.returnValue==='si'), {once:true}));
}

async function carica(){
  try{
    const d = await api('/clienti');
    CLIENTI = d.clienti || {};
    render();
  }catch(e){
    $('#lista').innerHTML = `<div class="vuoto">Non riesco a caricare.<br><small>${e.message}</small></div>`;
  }
}

function render(){
  const q = QUERY.trim().toLowerCase();
  const righe = Object.entries(CLIENTI)
    .filter(([piva,c])=>{
      if(!q) return true;
      return [c.denominazione, c.nome, c.cognome, piva, c.comune, c.codiceDestinatario, c.pec]
        .join(' ').toLowerCase().includes(q);
    })
    .sort((a,b)=> (a[1].denominazione||a[1].cognome||'').localeCompare(b[1].denominazione||b[1].cognome||''));

  $('#conta').textContent = q
    ? `${righe.length} di ${Object.keys(CLIENTI).length} clienti`
    : `${Object.keys(CLIENTI).length} clienti`;

  $('#lista').innerHTML = righe.length ? righe.map(([piva,c])=>{
    const nome = c.denominazione || `${c.cognome||''} ${c.nome||''}`.trim() || 'senza nome';
    const ind = [c.indirizzo, c.civico].filter(Boolean).join(' ');
    const loc = [c.cap, c.comune, c.provincia].filter(Boolean).join(' ');
    const rec = c.codiceDestinatario
      ? `<span class="sdi">${c.codiceDestinatario}</span>`
      : (c.pec ? `<span class="sdi">${c.pec}</span>` : `<span class="sdi manca">recapito mancante</span>`);
    return `<div class="cli">
      <div>
        <div class="nome">${nome}</div>
        <div class="dati">P.IVA ${piva}${ind ? ' · '+ind : ''}${loc ? ' · '+loc : ''}</div>
        ${rec}
      </div>
      <div class="azioni">
        <button onclick="modifica('${piva}')">Modifica</button>
        <button class="danger" onclick="elimina('${piva}')">Elimina</button>
      </div>
    </div>`;
  }).join('') : `<div class="vuoto">${q ? 'Nessun cliente trovato.' : 'Nessun cliente in archivio.'}</div>`;
}

function modulo(c){
  c = c || {};
  return `<label>Partita IVA o codice fiscale</label>
    <div class="cerca-piva">
      <input id="c-piva" value="${c.piva||''}" placeholder="11 cifre">
      <button type="button" class="act" onclick="cercaPiva()">Cerca</button>
    </div>
    <div class="esito" id="c-esito"></div>
    <label>Denominazione</label><input id="c-den" value="${(c.denominazione||'').replace(/"/g,'&quot;')}">
    <div class="riga2">
      <div><label>Nome</label><input id="c-nome" value="${c.nome||''}"></div>
      <div><label>Cognome</label><input id="c-cogn" value="${c.cognome||''}"></div>
    </div>
    <label>Indirizzo</label><input id="c-ind" value="${((c.indirizzo||'')+(c.civico?' '+c.civico:'')).replace(/"/g,'&quot;')}">
    <div class="riga2">
      <div><label>CAP</label><input id="c-cap" value="${c.cap||''}"></div>
      <div><label>Comune</label><input id="c-com" value="${c.comune||''}"></div>
      <div><label>Prov.</label><input id="c-pro" value="${c.provincia||''}" maxlength="2"></div>
    </div>
    <div class="riga2">
      <div><label>Codice destinatario</label><input id="c-sdi" value="${c.codiceDestinatario||''}" maxlength="7"></div>
      <div><label>oppure PEC</label><input id="c-pec" value="${c.pec||''}"></div>
    </div>`;
}

function leggiModulo(){
  const piva = $('#c-piva').value.replace(/[^0-9A-Za-z]/g,'');
  return {
    piva, cf: piva,
    denominazione: $('#c-den').value.trim(),
    nome: $('#c-nome').value.trim(),
    cognome: $('#c-cogn').value.trim(),
    indirizzo: $('#c-ind').value.trim(),
    cap: $('#c-cap').value.trim(),
    comune: $('#c-com').value.trim(),
    provincia: $('#c-pro').value.trim().toUpperCase(),
    nazione: 'IT',
    codiceDestinatario: $('#c-sdi').value.trim().toUpperCase(),
    pec: $('#c-pec').value.trim()
  };
}

window.cercaPiva = async ()=>{
  const piva = $('#c-piva').value.replace(/[^0-9]/g,'');
  const es = $('#c-esito');
  if(piva.length !== 11){ es.className='esito ko'; es.textContent='Servono 11 cifre'; return; }
  es.className='esito'; es.textContent='Cerco…';
  try{
    const d = await api('/cercaPiva?piva='+piva);
    $('#c-den').value = d.denominazione || '';
    $('#c-ind').value = d.indirizzo || '';
    $('#c-cap').value = d.cap || '';
    $('#c-com').value = d.comune || '';
    $('#c-pro').value = d.provincia || '';
    es.className='esito ok'; es.textContent='Trovato: '+d.denominazione;
  }catch(e){ es.className='esito ko'; es.textContent=e.message; }
};

async function salva(c){
  if(!c.piva){ toast('Manca la partita IVA', true); return false; }
  if(!c.denominazione && !(c.nome && c.cognome)){ toast('Manca la denominazione', true); return false; }
  try{
    await api('/clienti', {method:'POST', body: JSON.stringify(c)});
    CLIENTI[c.piva] = c;
    render();
    toast('Cliente salvato');
    return true;
  }catch(e){ toast('Non riesco a salvare: '+e.message, true); return false; }
}

window.modifica = async (piva)=>{
  const c = CLIENTI[piva];
  const ok = await dialogo('Modifica cliente', c.denominazione || piva, modulo({...c, piva}), 'Salva');
  if(!ok) return;
  await salva(leggiModulo());
};

window.elimina = async (piva)=>{
  const c = CLIENTI[piva];
  const ok = await dialogo('Elimina cliente',
    `${c.denominazione || piva} verrà rimosso dall'archivio. Le fatture già emesse non cambiano.`,
    '', 'Elimina');
  if(!ok) return;
  delete CLIENTI[piva];
  try{
    await api('/clienti', {method:'POST', body: JSON.stringify({__sostituisci: true, ...CLIENTI})});
    render();
    toast('Cliente eliminato');
  }catch(e){ toast('Non riesco a eliminare: '+e.message, true); carica(); }
};

$('#nuovo').onclick = async ()=>{
  const ok = await dialogo('Nuovo cliente', 'Cerca dalla partita IVA o inserisci a mano', modulo({}), 'Salva');
  if(!ok) return;
  await salva(leggiModulo());
};

$('#q').addEventListener('input', e => { QUERY = e.target.value; render(); });
$('#torna').onclick = ()=> location.href = 'fisco.html';

carica();
</script>
</body>
</html>
