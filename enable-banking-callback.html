<!DOCTYPE html>
<html lang="it">
<head><meta charset="UTF-8"><title>Autorizzazione — iCompta</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f4f0;margin:0}
.card{background:#fff;border-radius:20px;padding:32px 28px;width:min(380px,90vw);text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.1)}
h2{font-size:18px;margin-bottom:8px}
p{color:#666;font-size:14px;margin-bottom:20px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e4e3dd;border-top-color:#1a4a7a;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{color:#1a7a4a;font-size:40px}
.err{color:#b83232;font-size:14px;margin-top:8px}
button{padding:12px 24px;border-radius:10px;border:none;background:#1a4a7a;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h2>Autorizzazione in corso...</h2>
  <p>Completamento collegamento con la banca.</p>
</div>
<script>
(async function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  var error = params.get('error');
  var card = document.getElementById('card');
  
  if (error) {
    card.innerHTML = '<div class="err">❌ Autorizzazione annullata o fallita.<br>' + (params.get('error_description')||error) + '</div>' +
      '<button onclick="window.location.href=\'icompta.html\'">← Torna a iCompta</button>';
    return;
  }
  
  if (!code) {
    card.innerHTML = '<div class="err">❌ Parametro code mancante.</div>' +
      '<button onclick="window.location.href=\'icompta.html\'">← Torna a iCompta</button>';
    return;
  }
  
  // Invia code al worker per completare la sessione
  var token = localStorage.getItem('icompta_token');
  try {
    var resp = await fetch('https://icompta-worker.f-castiglioni.workers.dev/api/enable-banking/session', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, state: state })
    });
    var data = await resp.json();
    if (data.ok) {
      card.innerHTML = '<div class="ok">✅</div><h2>Collegamento completato!</h2>' +
        '<p>Banca collegata con successo. Puoi ora importare i movimenti in iCompta.</p>' +
        '<button onclick="window.location.href=\'icompta.html\'">← Torna a iCompta</button>';
    } else {
      throw new Error(data.error || 'Errore sconosciuto');
    }
  } catch(e) {
    card.innerHTML = '<div class="err">❌ Errore: ' + e.message + '</div>' +
      '<button onclick="window.location.href=\'icompta.html\'">← Torna a iCompta</button>';
  }
})();
</script>
</body>
</html>
